name: Railway Multi-Service Deployment

on:
  push:
    branches:
      - main
      - production
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      service:
        description: 'Specific service to deploy (all, backend-api, frontend, celery-worker, celery-beat)'
        required: false
        default: 'all'

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  # =============================================================================
  # JOB 1: Validate Configuration
  # =============================================================================
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate railway.toml
        run: |
          echo "Validating railway.toml configuration..."
          if [ ! -f railway.toml ]; then
            echo "❌ railway.toml not found"
            exit 1
          fi
          echo "✅ railway.toml found"

      - name: Validate Dockerfiles
        run: |
          echo "Validating Dockerfiles..."

          # Backend
          if [ ! -f backend-hormonia/Dockerfile ]; then
            echo "❌ Backend Dockerfile not found"
            exit 1
          fi

          # Celery Worker
          if [ ! -f backend-hormonia/Dockerfile.worker ]; then
            echo "❌ Celery Worker Dockerfile not found"
            exit 1
          fi

          # Celery Beat
          if [ ! -f backend-hormonia/Dockerfile.beat ]; then
            echo "❌ Celery Beat Dockerfile not found"
            exit 1
          fi

          # Frontend
          if [ ! -f frontend-hormonia/Dockerfile ]; then
            echo "❌ Frontend Dockerfile not found"
            exit 1
          fi

          echo "✅ All Dockerfiles present"

      - name: Check environment variables documentation
        run: |
          if [ ! -f docs/deployment/RAILWAY_ENV_VARS_CHECKLIST.md ]; then
            echo "⚠️  Environment variables checklist not found"
          else
            echo "✅ Environment variables documented"
          fi

  # =============================================================================
  # JOB 2: Test Backend
  # =============================================================================
  test-backend:
    name: Test Backend API
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.service == 'all' || github.event.inputs.service == 'backend-api' || github.event.inputs.service == ''

    defaults:
      run:
        working-directory: backend-hormonia

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install ruff
          ruff check app/ --select=E,F,W --ignore=E501

      - name: Run type checking
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports || true

      - name: Run unit tests
        run: |
          pip install pytest pytest-asyncio pytest-cov
          pytest tests/ -v --cov=app --cov-report=xml || true

      - name: Validate app can start
        run: |
          python -c 'from app.main import app; print("✅ App validated successfully")'

  # =============================================================================
  # JOB 3: Test Frontend
  # =============================================================================
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.service == 'all' || github.event.inputs.service == 'frontend' || github.event.inputs.service == ''

    defaults:
      run:
        working-directory: frontend-hormonia

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-hormonia/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:run

      - name: Build application
        run: npm run build:prod
        env:
          NODE_ENV: production
          VITE_API_URL: https://backend-api.railway.app/api/v2
          VITE_API_BASE_URL: https://backend-api.railway.app
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # =============================================================================
  # JOB 4: Build and Test Docker Images
  # =============================================================================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    strategy:
      matrix:
        service:
          - name: backend-api
            context: backend-hormonia
            dockerfile: Dockerfile
          - name: celery-worker
            context: backend-hormonia
            dockerfile: Dockerfile.worker
          - name: celery-beat
            context: backend-hormonia
            dockerfile: Dockerfile.beat
          - name: frontend
            context: frontend-hormonia
            dockerfile: Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/${{ matrix.service.dockerfile }}
          push: false
          tags: ${{ matrix.service.name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker images | grep ${{ matrix.service.name }}
          echo "✅ Docker image built successfully: ${{ matrix.service.name }}"

  # =============================================================================
  # JOB 5: Deploy to Railway
  # =============================================================================
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          # Deploy all services using railway.toml
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment
        run: |
          echo "Waiting for Railway deployment to complete..."
          sleep 30

      - name: Check deployment status
        run: |
          railway status || echo "⚠️  Unable to check status"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # =============================================================================
  # JOB 6: Post-Deployment Tests
  # =============================================================================
  post-deployment:
    name: Post-Deployment Health Checks
    runs-on: ubuntu-latest
    needs: [deploy-railway]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production')

    steps:
      - name: Check Backend Health
        run: |
          echo "Checking backend health endpoint..."
          # Replace with your actual Railway URL
          BACKEND_URL="${{ secrets.RAILWAY_BACKEND_URL }}"

          if [ -z "$BACKEND_URL" ]; then
            echo "⚠️  RAILWAY_BACKEND_URL secret not set"
            exit 0
          fi

          response=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health" || echo "000")

          if [ "$response" = "200" ]; then
            echo "✅ Backend health check passed"
          else
            echo "❌ Backend health check failed (HTTP $response)"
            exit 1
          fi

      - name: Check Frontend Health
        run: |
          echo "Checking frontend health endpoint..."
          # Replace with your actual Railway URL
          FRONTEND_URL="${{ secrets.RAILWAY_FRONTEND_URL }}"

          if [ -z "$FRONTEND_URL" ]; then
            echo "⚠️  RAILWAY_FRONTEND_URL secret not set"
            exit 0
          fi

          response=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL/health" || echo "000")

          if [ "$response" = "200" ]; then
            echo "✅ Frontend health check passed"
          else
            echo "❌ Frontend health check failed (HTTP $response)"
            exit 1
          fi

      - name: Run database migrations
        run: |
          echo "Running database migrations..."
          # This requires Railway CLI with proper service context
          # railway run --service backend-api "alembic upgrade head"
          echo "⚠️  Manual migration required: railway run --service backend-api 'alembic upgrade head'"

  # =============================================================================
  # JOB 7: Notification
  # =============================================================================
  notify:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: [post-deployment]
    if: always()

    steps:
      - name: Deployment Success
        if: needs.post-deployment.result == 'success'
        run: |
          echo "🎉 Deployment to Railway completed successfully!"
          echo "Backend: ${{ secrets.RAILWAY_BACKEND_URL }}"
          echo "Frontend: ${{ secrets.RAILWAY_FRONTEND_URL }}"

      - name: Deployment Failed
        if: needs.post-deployment.result == 'failure'
        run: |
          echo "❌ Deployment to Railway failed!"
          exit 1

# =============================================================================
# Required Secrets (Set in GitHub Repository Settings)
# =============================================================================
# - RAILWAY_TOKEN: Railway API token for CLI authentication
# - RAILWAY_BACKEND_URL: Backend API URL for health checks
# - RAILWAY_FRONTEND_URL: Frontend URL for health checks
# - VITE_SUPABASE_URL: Supabase URL (for frontend build)
# - VITE_SUPABASE_ANON_KEY: Supabase anon key (for frontend build)
