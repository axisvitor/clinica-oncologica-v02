name: Continuous Integration

on:
  push:
    branches: [main, develop, docs-refactor-py313]
  pull_request:
    branches: [main, develop, docs-refactor-py313]
  workflow_dispatch:

# Prevent concurrent runs on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '18'
  POETRY_VERSION: '1.7.0'

jobs:
  # Backend Linting
  lint-backend:
    name: Backend Linting (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            backend-hormonia/.venv
          key: ${{ runner.os }}-pip-${{ hashFiles('backend-hormonia/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend-hormonia
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit[toml]
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run Ruff linter
        working-directory: backend-hormonia
        run: |
          ruff check . --output-format=github --exit-non-zero-on-fix
        continue-on-error: false

      - name: Run Ruff formatter check
        working-directory: backend-hormonia
        run: |
          ruff format --check .

      - name: Run MyPy type checking
        working-directory: backend-hormonia
        run: |
          mypy app --ignore-missing-imports --no-strict-optional --disable-error-code import-untyped
        continue-on-error: true

      - name: Check import sorting
        working-directory: backend-hormonia
        run: |
          pip install isort
          isort . --check-only --diff

  # Frontend Linting
  lint-frontend:
    name: Frontend Linting (Node 18)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-hormonia/package-lock.json

      - name: Install dependencies
        working-directory: frontend-hormonia
        run: npm ci --prefer-offline

      - name: Run ESLint
        working-directory: frontend-hormonia
        run: npm run lint

      - name: Run TypeScript compiler
        working-directory: frontend-hormonia
        run: npm run typecheck:ci

  # Backend Testing
  test-backend:
    name: Backend Tests (Python 3.13)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint-backend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hormonia_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            backend-hormonia/.venv
          key: ${{ runner.os }}-pip-test-${{ hashFiles('backend-hormonia/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend-hormonia
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-mock
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Create test environment file
        working-directory: backend-hormonia
        run: |
          cat > .env.test << EOF
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/hormonia_test
          REDIS_URL=redis://localhost:6379/0
          SECRET_KEY=test-secret-key-minimum-32-chars-long-for-security
          ENVIRONMENT=test
          DEBUG=false
          TESTING=true
          LOG_LEVEL=INFO
          EOF

      - name: Run pytest with coverage
        working-directory: backend-hormonia
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hormonia_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-minimum-32-chars-long-for-security
          ENVIRONMENT: test
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --junitxml=pytest-report.xml \
            -v \
            --tb=short \
            --maxfail=5

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend-hormonia/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload pytest results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-pytest-results
          path: |
            backend-hormonia/pytest-report.xml
            backend-hormonia/htmlcov/
          retention-days: 7

  # Frontend Testing
  test-frontend:
    name: Frontend Tests (Node 18)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-hormonia/package-lock.json

      - name: Install dependencies
        working-directory: frontend-hormonia
        run: npm ci --prefer-offline

      - name: Run Vitest tests with coverage
        working-directory: frontend-hormonia
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: frontend-hormonia/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: |
            frontend-hormonia/coverage/
          retention-days: 7

  # Security Scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python security tools
        run: |
          pip install bandit[toml] safety

      - name: Run Bandit security scan
        working-directory: backend-hormonia
        run: |
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -f screen
        continue-on-error: true

      - name: Run Safety check (Python dependencies)
        working-directory: backend-hormonia
        run: |
          if [ -f requirements.txt ]; then
            safety check --file requirements.txt --json > safety-report.json || true
            safety check --file requirements.txt || true
          fi
        continue-on-error: true

      - name: Setup Node.js for frontend security
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: frontend-hormonia
        run: npm ci --prefer-offline

      - name: Run npm audit
        working-directory: frontend-hormonia
        run: |
          npm audit --json > npm-audit-report.json || true
          npm audit --audit-level=moderate
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            backend-hormonia/bandit-report.json
            backend-hormonia/safety-report.json
            frontend-hormonia/npm-audit-report.json
          retention-days: 30

  # Build Verification
  build-backend:
    name: Build Backend (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-backend, security-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend-hormonia
          file: ./backend-hormonia/Dockerfile
          push: false
          tags: hormonia-backend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=3.13

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-hormonia/package-lock.json

      - name: Install dependencies
        working-directory: frontend-hormonia
        run: npm ci --prefer-offline

      - name: Build production bundle
        working-directory: frontend-hormonia
        env:
          NODE_ENV: production
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend-hormonia/dist/
          retention-days: 7

  # Final CI Status Check
  ci-status:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs:
      - lint-backend
      - lint-frontend
      - test-backend
      - test-frontend
      - security-scan
      - build-backend
      - build-frontend
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.lint-backend.result }}" != "success" ]] || \
             [[ "${{ needs.lint-frontend.result }}" != "success" ]] || \
             [[ "${{ needs.test-backend.result }}" != "success" ]] || \
             [[ "${{ needs.test-frontend.result }}" != "success" ]] || \
             [[ "${{ needs.build-backend.result }}" != "success" ]] || \
             [[ "${{ needs.build-frontend.result }}" != "success" ]]; then
            echo "❌ CI pipeline failed"
            exit 1
          fi
          echo "✅ All CI checks passed successfully"
