name: Security Scanning

on:
  push:
    branches: [main, develop, docs-refactor-py313]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Prevent concurrent security scans
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '18'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # Python Dependency Scanning
  python-dependency-scan:
    name: Python Dependencies Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install safety pip-audit

      - name: Run Safety check
        working-directory: backend-hormonia
        run: |
          echo "🔍 Running Safety scan on Python dependencies..."
          if [ -f requirements.txt ]; then
            safety check --file requirements.txt --json > safety-report.json || true
            safety check --file requirements.txt --full-report
          fi
        continue-on-error: true

      - name: Run pip-audit
        working-directory: backend-hormonia
        run: |
          echo "🔍 Running pip-audit..."
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --format json > pip-audit-report.json || true
            pip-audit -r requirements.txt
          fi
        continue-on-error: true

      - name: Upload Python security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-security-reports
          path: |
            backend-hormonia/safety-report.json
            backend-hormonia/pip-audit-report.json
          retention-days: 30

  # JavaScript Dependency Scanning
  javascript-dependency-scan:
    name: JavaScript Dependencies Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend-hormonia
        run: npm ci --prefer-offline

      - name: Run npm audit
        working-directory: frontend-hormonia
        run: |
          echo "🔍 Running npm audit..."
          npm audit --json > npm-audit-report.json || true
          npm audit --audit-level=moderate --production
        continue-on-error: true

      - name: Check for known vulnerabilities
        working-directory: frontend-hormonia
        run: |
          npm audit --audit-level=high --production || echo "⚠️ High severity vulnerabilities found"

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: frontend-hormonia/npm-audit-report.json
          retention-days: 30

  # Snyk Security Scanning
  snyk-scan:
    name: Snyk Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk for Python
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend-hormonia/requirements.txt --severity-threshold=high

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: frontend-hormonia
        run: npm ci --prefer-offline

      - name: Run Snyk for JavaScript
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=frontend-hormonia/package.json --severity-threshold=high

  # Code Security Scanning with Bandit
  bandit-scan:
    name: Bandit SAST (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security linter
        working-directory: backend-hormonia
        run: |
          echo "🔍 Running Bandit security scan..."
          bandit -r app/ \
            -f json \
            -o bandit-report.json \
            -ll \
            --recursive \
            -x */tests/*,*/migrations/*,*/alembic/* || true

          echo "📊 Bandit Results:"
          bandit -r app/ -f screen -ll --recursive -x */tests/*,*/migrations/*,*/alembic/*

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: backend-hormonia/bandit-report.json
          retention-days: 30

  # CodeQL Analysis
  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ['python', 'javascript']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # Semgrep SAST
  semgrep-scan:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/python
            p/javascript
            p/react
            p/typescript
            p/sql
          generateSarif: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # Secrets Scanning with TruffleHog
  secrets-scan:
    name: TruffleHog Secrets Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # Gitleaks Secret Scanning
  gitleaks-scan:
    name: Gitleaks Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Docker Image Scanning with Trivy
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ./backend-hormonia
          file: ./backend-hormonia/Dockerfile
          push: false
          tags: hormonia-backend:scan
          cache-from: type=gha
          load: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hormonia-backend:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy in table mode
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hormonia-backend:scan
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'

  # OWASP Dependency Check
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'hormonia-clinic'
          path: '.'
          format: 'HTML'
          args: >
            --enableRetired
            --enableExperimental

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check-report
          path: reports/
          retention-days: 30

  # Security Headers Check
  security-headers-check:
    name: Security Headers Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check security headers configuration
        run: |
          echo "🔍 Validating security headers configuration..."

          # Check for CSP configuration
          if grep -r "Content-Security-Policy" backend-hormonia/app/; then
            echo "✅ CSP configuration found"
          else
            echo "⚠️ No CSP configuration detected"
          fi

          # Check for HSTS
          if grep -r "Strict-Transport-Security" backend-hormonia/app/; then
            echo "✅ HSTS configuration found"
          else
            echo "⚠️ No HSTS configuration detected"
          fi

          # Check for X-Frame-Options
          if grep -r "X-Frame-Options" backend-hormonia/app/; then
            echo "✅ X-Frame-Options configuration found"
          else
            echo "⚠️ No X-Frame-Options configuration detected"
          fi

  # Environment Variables Security Check
  env-security-check:
    name: Environment Security Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for exposed secrets in .env.example files
        run: |
          echo "🔍 Checking .env.example files for security issues..."

          # Check for actual values in example files
          if grep -r "sk-" .env.example backend-hormonia/.env.example frontend-hormonia/.env.example 2>/dev/null; then
            echo "❌ Potential API keys found in .env.example files"
            exit 1
          fi

          # Check for real passwords
          if grep -r "password=.*[^example]" .env.example backend-hormonia/.env.example frontend-hormonia/.env.example 2>/dev/null; then
            echo "⚠️ Potential real passwords in .env.example"
          fi

          echo "✅ .env.example files appear safe"

  # Security Summary
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs:
      - python-dependency-scan
      - javascript-dependency-scan
      - bandit-scan
      - codeql-analysis
      - semgrep-scan
      - secrets-scan
      - gitleaks-scan
      - trivy-scan
    if: always()

    steps:
      - name: Create security summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # 🔒 Security Scan Summary

          ## Scan Results
          - **Python Dependencies**: ${{ needs.python-dependency-scan.result == 'success' && '✅ Pass' || '⚠️ Issues Found' }}
          - **JavaScript Dependencies**: ${{ needs.javascript-dependency-scan.result == 'success' && '✅ Pass' || '⚠️ Issues Found' }}
          - **Bandit SAST**: ${{ needs.bandit-scan.result == 'success' && '✅ Pass' || '⚠️ Issues Found' }}
          - **CodeQL**: ${{ needs.codeql-analysis.result == 'success' && '✅ Pass' || '⚠️ Issues Found' }}
          - **Semgrep**: ${{ needs.semgrep-scan.result == 'success' && '✅ Pass' || '⚠️ Issues Found' }}
          - **Secrets Scan**: ${{ needs.secrets-scan.result == 'success' && '✅ No secrets' || '⚠️ Secrets detected' }}
          - **Gitleaks**: ${{ needs.gitleaks-scan.result == 'success' && '✅ No leaks' || '⚠️ Leaks detected' }}
          - **Trivy**: ${{ needs.trivy-scan.result == 'success' && '✅ Pass' || '⚠️ Vulnerabilities found' }}

          ## Recommendations
          - Review all security artifacts for detailed findings
          - Address critical and high severity issues immediately
          - Update dependencies with known vulnerabilities
          - Rotate any exposed secrets immediately

          ## Next Steps
          - Check the Security tab for detailed findings
          - Review uploaded artifacts for full reports
          - Create issues for vulnerabilities requiring fixes
          EOF

      - name: Notify on critical findings
        if: |
          needs.secrets-scan.result == 'failure' ||
          needs.gitleaks-scan.result == 'failure'
        uses: slackapi/slack-github-action@v1.25.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_SECURITY }}
        with:
          payload: |
            {
              "text": "🚨 Critical Security Issue Detected",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚨 Security Alert: Secrets Detected"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Action:* Immediate remediation required"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
