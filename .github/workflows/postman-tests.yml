name: Postman API Tests

on:
  push:
    branches: [ main, develop, staging ]
    paths:
      - 'backend-hormonia/app/**'
      - 'backend-hormonia/postman/**'
      - '.github/workflows/postman-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend-hormonia/app/**'
      - 'backend-hormonia/postman/**'
  schedule:
    # Run daily at 2 AM Sao Paulo
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'staging'
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  api-tests:
    name: Run Postman API Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hormonia_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Python dependencies
        working-directory: ./backend-hormonia
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Newman (Postman CLI)
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Create test environment file
        working-directory: ./backend-hormonia
        run: |
          cat > .env.test << EOF
          ENVIRONMENT=test
          DEBUG=true
          LOG_LEVEL=DEBUG

          DATABASE_URL=postgresql+psycopg://postgres:postgres@localhost:5432/hormonia_test
          DB_POOL_SIZE=5
          DB_MAX_OVERFLOW=10

          ENABLE_REDIS=true
          REDIS_URL=redis://localhost:6379/0
          REDIS_SSL=false

          JWT_SECRET=test-jwt-secret-for-ci-cd-only-not-for-production
          CSRF_SECRET_KEY=test-csrf-secret-for-ci-cd-only
          ENCRYPTION_KEY=test-encryption-key-for-ci-cd-only-32-bytes

          ENABLE_EVOLUTION=false
          EVOLUTION_API_URL=http://localhost:8080
          EVOLUTION_API_KEY=test-key
          EVOLUTION_WEBHOOK_SECRET=test-webhook-secret

          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

          FIREBASE_ADMIN_PROJECT_ID=test-project
          FIREBASE_ADMIN_CLIENT_EMAIL=test@test.iam.gserviceaccount.com
          FIREBASE_ADMIN_PRIVATE_KEY=${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}

          SENTRY_DSN=
          ENABLE_SWAGGER_UI=true
          EOF

      - name: Run database migrations
        working-directory: ./backend-hormonia
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/hormonia_test
        run: |
          alembic upgrade head

      - name: Start backend server
        working-directory: ./backend-hormonia
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > server.pid

          # Wait for server to be ready
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done'

      - name: Verify server is running
        run: |
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/docs

      - name: Run Postman Collection Tests
        working-directory: ./backend-hormonia/postman
        run: |
          newman run Backend_Hormonia_API.postman_collection.json \
            -e Development.postman_environment.json \
            --env-var "base_url=http://localhost:8000" \
            --reporters cli,htmlextra,json \
            --reporter-htmlextra-export newman-report.html \
            --reporter-json-export newman-report.json \
            --bail \
            --timeout-request 10000 \
            --delay-request 100

      - name: Upload Newman HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report-node-${{ matrix.node-version }}
          path: backend-hormonia/postman/newman-report.html
          retention-days: 30

      - name: Upload Newman JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-json-report-node-${{ matrix.node-version }}
          path: backend-hormonia/postman/newman-report.json
          retention-days: 30

      - name: Check test results
        if: always()
        run: |
          if [ -f backend-hormonia/postman/newman-report.json ]; then
            echo "Test Results Summary:"
            cat backend-hormonia/postman/newman-report.json | jq '.run.stats'
          fi

      - name: Stop backend server
        if: always()
        working-directory: ./backend-hormonia
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
            rm server.pid
          fi

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'backend-hormonia/postman/newman-report.json';

            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const stats = report.run.stats;

              const comment = `## 🧪 Postman API Test Results

              **Environment:** Development (Node.js ${{ matrix.node-version }})
              **Total Requests:** ${stats.requests.total}
              **Passed:** ✅ ${stats.assertions.total - stats.assertions.failed}
              **Failed:** ❌ ${stats.assertions.failed}
              **Execution Time:** ${(stats.requests.total * stats.requests.average).toFixed(2)}ms

              ${stats.assertions.failed === 0 ? '🎉 All tests passed!' : '⚠️ Some tests failed. Check the detailed report.'}

              [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

  integration-tests:
    name: Full Integration Tests
    needs: api-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run full integration test suite
        run: |
          echo "Running full integration tests..."
          # Add integration test commands here

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Postman API tests passed for ${{ github.repository }} on branch ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Postman API Tests Passed* ✅\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ Postman API tests failed for ${{ github.repository }} on branch ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Postman API Tests Failed* ❌\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
