name: Frontend Monthly Quiz Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

concurrency:
  group: frontend-monthly-quiz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-quiz:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-hormonia
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-hormonia/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck:ci

      # Nota: omitimos lint completo aqui pois o projeto possui pendências de limpeza global
      # Podemos adicionar um lint focado nestes testes futuramente

      - name: Run Monthly Quiz tests
        run: npm run test:quiz
