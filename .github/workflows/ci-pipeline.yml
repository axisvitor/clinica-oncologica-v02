name: CI/CD Pipeline - Enhanced

on:
  push:
    branches: [ main, develop, staging, feature/*, docs-refactor-py313 ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: 'Skip E2E tests'
        required: false
        default: false
        type: boolean
      coverage_threshold:
        description: 'Coverage threshold percentage'
        required: false
        default: '80'
        type: string

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '18'
  COVERAGE_THRESHOLD: ${{ github.event.inputs.coverage_threshold || '80' }}
  SKIP_E2E: ${{ github.event.inputs.skip_e2e || 'false' }}

jobs:
  # ==========================================================================
  # CODE QUALITY & VALIDATION
  # ==========================================================================
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend-hormonia/requirements.txt'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend-hormonia/package-lock.json'

      - name: Install Python linters
        working-directory: ./backend-hormonia
        run: |
          pip install pylint black flake8 mypy isort
          pip install -r requirements.txt

      - name: Run Python linting
        working-directory: ./backend-hormonia
        run: |
          echo "Running Black..."
          black --check app/ || echo "::warning::Black formatting issues found"

          echo "Running isort..."
          isort --check-only app/ || echo "::warning::Import order issues found"

          echo "Running Flake8..."
          flake8 app/ --max-line-length=120 --extend-ignore=E203,W503 || echo "::warning::Flake8 issues found"

      - name: Install Frontend dependencies
        working-directory: ./frontend-hormonia
        run: npm ci

      - name: Run TypeScript checks
        working-directory: ./frontend-hormonia
        run: npm run typecheck

      - name: Run ESLint
        working-directory: ./frontend-hormonia
        run: npm run lint

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: |
            backend-hormonia/.pylint.json
            frontend-hormonia/eslint-results.json

  # ==========================================================================
  # ENVIRONMENT VALIDATION
  # ==========================================================================
  env-validation:
    name: Environment Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test .env file
        run: |
          cp backend-hormonia/.env.example .env
          # Set required test values
          sed -i 's/DATABASE_URL=.*/DATABASE_URL=postgresql:\/\/postgres:postgres@localhost:5432\/test_db/' .env
          sed -i 's/REDIS_PASSWORD=.*/REDIS_PASSWORD=test_redis_password_32_chars_min/' .env
          sed -i 's/CSRF_SECRET_KEY=.*/CSRF_SECRET_KEY=test_csrf_secret_key_32_chars_min/' .env
          sed -i 's/EVOLUTION_WEBHOOK_SECRET=.*/EVOLUTION_WEBHOOK_SECRET=test_webhook_secret_32_chars_min/' .env
          sed -i 's/MONTHLY_QUIZ_TOKEN_SECRET=.*/MONTHLY_QUIZ_TOKEN_SECRET=test_quiz_secret_32_chars_min/' .env
          sed -i 's/POSTGRES_PASSWORD=.*/POSTGRES_PASSWORD=test_postgres_password/' .env

      - name: Validate environment variables
        run: |
          chmod +x scripts/validate-env.sh
          ./scripts/validate-env.sh development

  # ==========================================================================
  # BACKEND TESTS WITH COVERAGE
  # ==========================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [code-quality, env-validation]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend-hormonia/requirements.txt'

      - name: Install dependencies
        working-directory: ./backend-hormonia
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock

      - name: Set up test environment
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_db" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV
          echo "TESTING=true" >> $GITHUB_ENV
          echo "ENVIRONMENT=testing" >> $GITHUB_ENV

      - name: Run migrations
        working-directory: ./backend-hormonia
        run: |
          if [ -f "alembic.ini" ]; then
            alembic upgrade head || echo "No migrations to run"
          fi

      - name: Run tests with coverage
        working-directory: ./backend-hormonia
        run: |
          pytest \
            --verbose \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            --junitxml=junit.xml \
            tests/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend-hormonia/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend-hormonia/coverage.xml
            backend-hormonia/htmlcov/
            backend-hormonia/junit.xml

  # ==========================================================================
  # FRONTEND TESTS WITH COVERAGE
  # ==========================================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [code-quality, env-validation]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend-hormonia/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend-hormonia
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: ./frontend-hormonia
        run: |
          npm run test -- \
            --coverage \
            --coverageReporters=text \
            --coverageReporters=lcov \
            --coverageReporters=json-summary \
            --run

      - name: Check coverage threshold
        working-directory: ./frontend-hormonia
        run: |
          if [ -f "coverage/coverage-summary.json" ]; then
            COVERAGE=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
            echo "Coverage: $COVERAGE%"
            if (( $(echo "$COVERAGE < ${{ env.COVERAGE_THRESHOLD }}" | bc -l) )); then
              echo "::error::Coverage $COVERAGE% is below threshold ${{ env.COVERAGE_THRESHOLD }}%"
              exit 1
            fi
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./frontend-hormonia/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            frontend-hormonia/coverage/

  # ==========================================================================
  # E2E TESTS (Playwright)
  # ==========================================================================
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event.inputs.skip_e2e != 'true'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend-hormonia/package-lock.json'

      - name: Install Playwright
        working-directory: ./frontend-hormonia
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Install backend dependencies
        working-directory: ./backend-hormonia
        run: |
          pip install -r requirements.txt

      - name: Start backend server
        working-directory: ./backend-hormonia
        run: |
          export DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_db
          export REDIS_URL=redis://localhost:6379
          export TESTING=true
          alembic upgrade head || true
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379

      - name: Start frontend dev server
        working-directory: ./frontend-hormonia
        run: |
          npm run dev &
          sleep 15
        env:
          VITE_API_URL: http://localhost:8000/api/v2

      - name: Run E2E tests
        working-directory: ./frontend-hormonia
        run: |
          npx playwright test --reporter=html,json

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            frontend-hormonia/playwright-report/
            frontend-hormonia/test-results/

      - name: Upload E2E screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: frontend-hormonia/test-results/

  # ==========================================================================
  # DOCKER BUILD TEST
  # ==========================================================================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-hormonia
          file: ./backend-hormonia/Dockerfile
          push: false
          tags: hormonia-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-hormonia
          file: ./frontend-hormonia/Dockerfile
          push: false
          tags: hormonia-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test docker-compose
        run: |
          # Create minimal .env for testing
          cat > .env << EOF
          POSTGRES_PASSWORD=test_password
          REDIS_PASSWORD=test_redis_password
          CSRF_SECRET_KEY=test_csrf_secret_key_32_characters
          EVOLUTION_WEBHOOK_SECRET=test_webhook_secret_32_characters
          MONTHLY_QUIZ_TOKEN_SECRET=test_quiz_secret_32_characters
          EOF

          # Validate docker-compose syntax
          docker-compose config

  # ==========================================================================
  # SECURITY SCAN
  # ==========================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [code-quality]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Bandit security scan (Python)
        working-directory: ./backend-hormonia
        run: |
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json || true

      - name: Upload security scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            trivy-results.sarif
            backend-hormonia/bandit-report.json

  # ==========================================================================
  # COVERAGE REPORT
  # ==========================================================================
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()

    steps:
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-test-results
          path: backend-coverage/

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-test-results
          path: frontend-coverage/

      - name: Generate combined coverage report
        run: |
          echo "## Test Coverage Summary" > coverage-summary.md
          echo "" >> coverage-summary.md

          if [ -f "backend-coverage/coverage.xml" ]; then
            echo "### Backend Coverage" >> coverage-summary.md
            echo "See backend-coverage/htmlcov/index.html" >> coverage-summary.md
            echo "" >> coverage-summary.md
          fi

          if [ -f "frontend-coverage/coverage-summary.json" ]; then
            echo "### Frontend Coverage" >> coverage-summary.md
            COVERAGE=$(node -p "require('./frontend-coverage/coverage-summary.json').total.lines.pct")
            echo "Lines: $COVERAGE%" >> coverage-summary.md
          fi

      - name: Comment PR with coverage
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-summary.md', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  # ==========================================================================
  # CORS VALIDATION
  # ==========================================================================
  cors-validation:
    name: CORS Configuration Validation
    runs-on: ubuntu-latest
    needs: [backend-tests]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'backend-hormonia/requirements.txt'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Python dependencies
        working-directory: ./backend-hormonia
        run: |
          pip install -r requirements.txt

      - name: Install Node.js dependencies for validation
        run: npm install axios

      - name: Configure test environment
        working-directory: ./backend-hormonia
        run: |
          cp .env.example .env
          cat >> .env << EOF
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL=redis://localhost:6379
          CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
          ENVIRONMENT=test
          EOF

      - name: Run database migrations
        working-directory: ./backend-hormonia
        run: |
          alembic upgrade head || echo "No migrations to run"

      - name: Start FastAPI application
        working-directory: ./backend-hormonia
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/fastapi.pid
          sleep 10

      - name: Wait for API to be ready
        working-directory: ./backend-hormonia
        run: |
          chmod +x scripts/wait-for-api.sh
          ./scripts/wait-for-api.sh http://localhost:8000 60

      - name: Run CORS validation (Shell)
        working-directory: ./backend-hormonia
        run: |
          chmod +x scripts/validate-cors.sh
          ./scripts/validate-cors.sh http://localhost:8000 http://localhost:5173

      - name: Run CORS validation (Node.js)
        working-directory: ./backend-hormonia
        env:
          API_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:5173
          VERBOSE: 'true'
        run: node scripts/validate-cors.js

      - name: Generate validation report
        if: always()
        working-directory: ./backend-hormonia
        run: |
          chmod +x scripts/generate-cors-report.sh
          ./scripts/generate-cors-report.sh

      - name: Upload CORS validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cors-validation-reports
          path: |
            backend-hormonia/cors-validation-report.txt
            backend-hormonia/cors-validation-report.json
            backend-hormonia/cors-validation-report.html
          retention-days: 30

      - name: Stop FastAPI application
        if: always()
        run: |
          if [ -f /tmp/fastapi.pid ]; then
            kill $(cat /tmp/fastapi.pid) || true
          fi

      - name: Comment PR with CORS validation results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'backend-hormonia/cors-validation-report.json';

            if (!fs.existsSync(reportPath)) {
              console.log('CORS validation report not found');
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const passIcon = '✅';
            const failIcon = '❌';
            const warnIcon = '⚠️';

            const body = `## CORS Configuration Validation

            **Environment:** CI/CD Pipeline
            **Timestamp:** ${new Date(report.timestamp).toLocaleString()}

            ### Summary
            | Metric | Value | Status |
            |--------|-------|--------|
            | **Total Tests** | ${report.summary.total} | - |
            | **Passed** | ${report.summary.passed} | ${passIcon} |
            | **Failed** | ${report.summary.failed} | ${report.summary.failed === 0 ? passIcon : failIcon} |
            | **Warnings** | ${report.summary.warnings} | ${report.summary.warnings === 0 ? passIcon : warnIcon} |
            | **Pass Rate** | ${report.summary.passRate}% | ${report.summary.passRate >= 95 ? passIcon : warnIcon} |

            ### Test Results
            ${report.tests.map(test => {
              const statusIcon = test.status === 'pass' ? passIcon : test.status === 'warning' ? warnIcon : failIcon;
              return `
            #### ${statusIcon} ${test.name}
            - **Status:** ${test.status.toUpperCase()}
            - **Details:** \`\`\`json
            ${JSON.stringify(test.details, null, 2)}
            \`\`\``;
            }).join('\n')}

            ---

            ${report.summary.failed > 0 ?
              `${failIcon} **Action Required:** Some CORS validations failed. Please review the configuration in \`backend-hormonia/app/middleware/cors.py\` and \`backend-hormonia/app/config/settings/security.py\`.` :
              `${passIcon} **All CORS validations passed!** The application is properly configured for cross-origin requests.`}

            [View full report in artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ==========================================================================
  # QUALITY GATE
  # ==========================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, e2e-tests, docker-build, security-scan, cors-validation]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "Checking pipeline results..."

          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "::error::Backend tests failed"
            exit 1
          fi

          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "::error::Frontend tests failed"
            exit 1
          fi

          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "::error::Docker build failed"
            exit 1
          fi

          if [ "${{ needs.cors-validation.result }}" != "success" ]; then
            echo "::error::CORS validation failed"
            exit 1
          fi

          echo "✅ All quality gates passed!"

      - name: Create deployment marker
        if: success() && github.ref == 'refs/heads/main'
        run: |
          echo "DEPLOYMENT_READY=true" >> $GITHUB_ENV
          echo "✅ Ready for deployment to production"
