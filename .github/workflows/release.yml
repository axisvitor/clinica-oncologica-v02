name: Release Management

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: read

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '18'

jobs:
  # Validate Release Tag
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}

    steps:
      - name: Extract version
        id: extract
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if prerelease
        id: check
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          if [[ "$VERSION" =~ (alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

  # Generate Changelog
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [validate-tag]
    timeout-minutes: 10
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: ".github/changelog-config.json"
          toTag: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: |
            CHANGELOG.md
          retention-days: 30

  # Build Release Artifacts
  build-artifacts:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: [validate-tag]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build backend wheel
        working-directory: backend-hormonia
        run: |
          pip install build
          python -m build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        working-directory: frontend-hormonia
        run: |
          npm ci --prefer-offline
          npm run build:prod

      - name: Create source archive
        run: |
          tar -czf hormonia-${{ needs.validate-tag.outputs.version }}-source.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=dist \
            --exclude=__pycache__ \
            .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            backend-hormonia/dist/*.whl
            frontend-hormonia/dist/
            hormonia-${{ needs.validate-tag.outputs.version }}-source.tar.gz
          retention-days: 90

  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, generate-changelog, build-artifacts]
    timeout-minutes: 10
    outputs:
      release_id: ${{ steps.create_release.outputs.id }}
      release_url: ${{ steps.create_release.outputs.html_url }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: ./artifacts

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate-tag.outputs.version }}
          name: Release v${{ needs.validate-tag.outputs.version }}
          body: ${{ needs.generate-changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ needs.validate-tag.outputs.is_prerelease }}
          files: |
            ./artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}

  # Publish Docker Images
  publish-docker-images:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: [validate-tag, create-release]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-hormonia
          file: ./backend-hormonia/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ needs.validate-tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-hormonia
          file: ./frontend-hormonia/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ needs.validate-tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Update Documentation
  update-docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    needs: [create-release]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in docs
        run: |
          # Update version references in documentation
          VERSION="${{ needs.validate-tag.outputs.version }}"
          find docs/ -type f -name "*.md" -exec sed -i "s/Version: .*/Version: $VERSION/g" {} +

      - name: Commit documentation updates
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: update version to ${{ needs.validate-tag.outputs.version }}"
          git push
        continue-on-error: true

  # Notify Release
  notify-release:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [validate-tag, create-release]
    if: always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.25.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        with:
          payload: |
            {
              "text": "🎉 New Release Published",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🎉 Release v${{ needs.validate-tag.outputs.version }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Type:*\n${{ needs.validate-tag.outputs.is_prerelease == 'true' && 'Pre-release' || 'Stable Release' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Version:*\nv${{ needs.validate-tag.outputs.version }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ needs.create-release.outputs.release_url }}|View Release Notes>"
                  }
                }
              ]
            }

  # Create Deployment Issue
  create-deployment-issue:
    name: Create Deployment Tracking Issue
    runs-on: ubuntu-latest
    needs: [validate-tag, create-release]
    permissions:
      issues: write

    steps:
      - name: Create deployment issue
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.validate-tag.outputs.version }}';
            const releaseUrl = '${{ needs.create-release.outputs.release_url }}';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy v${version} to Production`,
              body: `## 🚀 Production Deployment Checklist

              Release: [v${version}](${releaseUrl})

              ### Pre-Deployment
              - [ ] Review release notes
              - [ ] Verify staging deployment
              - [ ] Database migration plan reviewed
              - [ ] Rollback plan documented
              - [ ] Team notified

              ### Deployment
              - [ ] Trigger production deployment workflow
              - [ ] Monitor deployment progress
              - [ ] Verify health checks

              ### Post-Deployment
              - [ ] Smoke tests passed
              - [ ] Monitoring dashboards checked
              - [ ] No error spike in logs
              - [ ] Performance metrics normal
              - [ ] Close this issue

              ### Rollback Plan
              If deployment fails:
              1. Trigger rollback workflow
              2. Restore from backup if needed
              3. Investigate root cause
              4. Create hotfix if necessary

              /cc @devops-team @backend-team @frontend-team
              `,
              labels: ['deployment', 'production', 'release']
            });
