name: E2E Tests

on:
  pull_request:
    branches: [main, develop, docs-refactor-py313]
  push:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '20'

jobs:
  backend-e2e:
    name: Backend E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hormonia_e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend-hormonia
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx faker

      - name: Run database migrations
        working-directory: ./backend-hormonia
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hormonia_e2e_test
        run: |
          alembic upgrade head

      - name: Run backend E2E tests
        working-directory: ./backend-hormonia
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hormonia_e2e_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: test
        run: |
          pytest tests/e2e/ \
            -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=test-results/backend-e2e-junit.xml

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-results
          path: |
            backend-hormonia/test-results/
            backend-hormonia/htmlcov/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend-hormonia/coverage.xml
          flags: backend-e2e
          name: backend-e2e-coverage

  frontend-e2e:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-hormonia/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend-hormonia
        run: |
          npm ci
          npx playwright install --with-deps ${{ matrix.browser }}

      - name: Build frontend
        working-directory: ./frontend-hormonia
        run: npm run build

      - name: Run Playwright E2E tests
        working-directory: ./frontend-hormonia
        env:
          E2E_BASE_URL: http://localhost:5173
        run: |
          npx playwright test --project=${{ matrix.browser }} --config=tests/e2e/playwright.config.e2e.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-e2e-results-${{ matrix.browser }}
          path: |
            frontend-hormonia/test-results/
            frontend-hormonia/playwright-report/

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ matrix.browser }}
          path: frontend-hormonia/test-results/**/*.png

      - name: Upload videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-videos-${{ matrix.browser }}
          path: frontend-hormonia/test-results/**/*.webm

  integration-e2e:
    name: Full Stack Integration E2E
    runs-on: ubuntu-latest
    needs: [backend-e2e, frontend-e2e]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hormonia_e2e_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: ./backend-hormonia
        run: |
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: ./frontend-hormonia
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start backend server
        working-directory: ./backend-hormonia
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hormonia_e2e_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          alembic upgrade head
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Build and start frontend
        working-directory: ./frontend-hormonia
        env:
          VITE_API_URL: http://localhost:8000
        run: |
          npm run build
          npm run preview -- --port 5173 &
          sleep 5

      - name: Run integration E2E tests
        working-directory: ./frontend-hormonia
        env:
          E2E_BASE_URL: http://localhost:5173
          API_BASE_URL: http://localhost:8000
        run: |
          npx playwright test --project=chromium --config=tests/e2e/playwright.config.e2e.ts

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-e2e-results
          path: |
            frontend-hormonia/test-results/
            frontend-hormonia/playwright-report/

  report:
    name: Generate E2E Test Report
    runs-on: ubuntu-latest
    needs: [backend-e2e, frontend-e2e, integration-e2e]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Publish test report
        uses: dorny/test-reporter@v1
        with:
          name: E2E Test Results
          path: '**/*junit.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResults = {
              backend: 'backend-e2e-results',
              frontend: ['frontend-e2e-results-chromium', 'frontend-e2e-results-firefox', 'frontend-e2e-results-webkit'],
              integration: 'integration-e2e-results'
            };

            let comment = '## 🧪 E2E Test Results\n\n';
            comment += '✅ All E2E test suites completed!\n\n';
            comment += 'Detailed results are available in the workflow artifacts.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
