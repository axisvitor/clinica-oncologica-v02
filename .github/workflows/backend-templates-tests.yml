name: Backend Templates Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test-templates:
    if: ${{ env.DB_URL != '' }}
    runs-on: ubuntu-latest
    env:
      DB_URL: ${{ secrets.DB_URL }}
    defaults:
      run:
        working-directory: backend-hormonia
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run templates automated suite (no coverage)
        run: |
          python -m pytest -p no:cov tests/test_templates_automated.py -v --tb=line
