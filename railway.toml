# Railway Configuration - Monorepo with Railpack
# =============================================================================
# This project is a monorepo containing multiple services.
# All services use Railpack (NIXPACKS) for building.
#
# Services:
# 1. Backend API     - Root: backend-hormonia    (Python/FastAPI)
# 2. Celery Worker   - Root: backend-hormonia    (Python/Celery)
# 3. Celery Beat     - Root: backend-hormonia    (Python/Celery)
# 4. Frontend        - Root: frontend-hormonia   (React/Vite)
# 5. Quiz Interface  - Root: quiz-mensal-interface (Next.js)
# =============================================================================

[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
