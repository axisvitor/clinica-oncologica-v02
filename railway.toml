# Railway Multi-Service Configuration
# Monorepo deployment for Clínica Oncológica Hormonia
# Documentation: https://docs.railway.app/reference/config-as-code

# =============================================================================
# SERVICE 1: Backend API (FastAPI + Python 3.13)
# =============================================================================
[[services]]
name = "backend-api"
source = "backend-hormonia"

[services.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[services.deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 120
startCommand = "gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --access-logfile - --error-logfile -"

# =============================================================================
# SERVICE 2: Celery Worker (Background Tasks)
# =============================================================================
[[services]]
name = "celery-worker"
source = "backend-hormonia"

[services.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.worker"

[services.deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# =============================================================================
# SERVICE 3: Celery Beat (Scheduled Tasks)
# =============================================================================
[[services]]
name = "celery-beat"
source = "backend-hormonia"

[services.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.beat"

[services.deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# =============================================================================
# SERVICE 4: Frontend (React + Vite + Nginx)
# =============================================================================
[[services]]
name = "frontend"
source = "frontend-hormonia"

[services.build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[services.deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 100
startCommand = "nginx -g 'daemon off;'"

# =============================================================================
# SHARED CONFIGURATION NOTES
# =============================================================================
#
# Environment Variables Strategy:
# --------------------------------
# 1. Set in Railway Dashboard (REQUIRED):
#    - DATABASE_URL
#    - REDIS_URL
#    - SUPABASE_URL, SUPABASE_ANON_KEY
#    - SECRET_KEY, JWT_SECRET_KEY
#    - FIREBASE_* credentials
#    - GEMINI_API_KEY
#    - WHATSAPP_* credentials
#
# 2. Auto-generated by Railway:
#    - PORT (dynamically assigned)
#    - RAILWAY_ENVIRONMENT
#    - RAILWAY_PROJECT_ID
#
# 3. Service-to-Service Communication:
#    Backend: https://${{backend-api.RAILWAY_PUBLIC_DOMAIN}}
#    Frontend: https://${{frontend.RAILWAY_PUBLIC_DOMAIN}}
#
# Networking:
# -----------
# - Internal communication: Use Railway's private networking
# - External access: Use public domains
# - CORS: Configure in backend to allow frontend domain
#
# Deployment Order:
# -----------------
# 1. Backend API (provides /health endpoint)
# 2. Celery Worker + Beat (depends on backend database/redis)
# 3. Frontend (connects to backend API)
#
