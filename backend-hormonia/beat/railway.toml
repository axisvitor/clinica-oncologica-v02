# =============================================================================
# RAILWAY CONFIGURATION - Celery Beat Service (Railpack)
# =============================================================================
# Service: hormonia-celery-beat
# Type: Celery Beat (Scheduled Task Scheduler)
# Builder: Railpack (uses same Python environment as API)
# IMPORTANT: Never scale beyond 1 replica to avoid duplicate schedules
# =============================================================================

[build]
builder = "RAILPACK"

[deploy]
startCommand = "celery -A app.celery_app beat --loglevel=info"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1
