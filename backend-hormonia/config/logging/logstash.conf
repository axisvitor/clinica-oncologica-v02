# Logstash Pipeline Configuration for Hormonia Backend
# Processes logs from Filebeat and enriches before sending to Elasticsearch

input {
  # Receive logs from Filebeat
  beats {
    port => 5044
    ssl => true
    ssl_certificate_authorities => ["/etc/pki/ca/ca.crt"]
    ssl_certificate => "/etc/pki/server/server.crt"
    ssl_key => "/etc/pki/server/server.key"
    ssl_verify_mode => "force_peer"
  }

  # Alternative: Redis input for high-volume scenarios
  redis {
    host => "${REDIS_HOST:localhost}"
    port => "${REDIS_PORT:6379}"
    password => "${REDIS_PASSWORD:}"
    data_type => "list"
    key => "logs:*"
    codec => json
    tags => ["from_redis"]
  }

  # HTTP input for direct log submission
  http {
    port => 8080
    codec => json
    tags => ["from_http"]
    ssl => true
    ssl_certificate => "/etc/pki/server/server.crt"
    ssl_key => "/etc/pki/server/server.key"
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "log_data"
      remove_field => ["message"]
    }
  }

  # Extract timestamp
  if [log_data][timestamp] {
    date {
      match => ["[log_data][timestamp]", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Categorize log level
  if [log_data][level] {
    mutate {
      add_field => { "level" => "%{[log_data][level]}" }
    }
  }

  # Extract service and environment
  mutate {
    add_field => {
      "service" => "%{[log_data][service]:hormonia-backend}"
      "environment" => "%{[log_data][environment]:production}"
    }
  }

  # PHI Detection and Redaction (HIPAA Compliance)
  if [log_data][message] {
    # Detect potential PHI
    if [log_data][message] =~ /\b\d{3}-\d{2}-\d{4}\b/ or
       [log_data][message] =~ /\b\d{3}\.\d{3}\.\d{3}-\d{2}\b/ or
       [log_data][message] =~ /\bMRN:?\s*[A-Z0-9]{6,}\b/i {

      mutate {
        add_tag => ["contains_phi"]
        add_field => { "phi_detected" => "true" }
      }
    }

    # Redact PHI patterns
    mutate {
      gsub => [
        "[log_data][message]", "\b\d{3}-\d{2}-\d{4}\b", "[SSN_REDACTED]",
        "[log_data][message]", "\b\d{3}\.\d{3}\.\d{3}-\d{2}\b", "[CPF_REDACTED]",
        "[log_data][message]", "\bMRN:?\s*([A-Z0-9]{6,})\b", "MRN:[MRN_REDACTED]",
        "[log_data][message]", "\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Z|a-z]{2,}\b", "[EMAIL_REDACTED]",
        "[log_data][message]", "\b\d{3}[-.]?\d{3}[-.]?\d{4}\b", "[PHONE_REDACTED]"
      ]
    }
  }

  # Extract request context
  if [log_data][request_id] {
    mutate {
      add_field => { "request_id" => "%{[log_data][request_id]}" }
    }
  }

  if [log_data][user_id] {
    mutate {
      add_field => { "user_id" => "%{[log_data][user_id]}" }
    }
  }

  if [log_data][patient_id] {
    mutate {
      add_field => { "patient_id" => "%{[log_data][patient_id]}" }
      add_tag => ["patient_related"]
    }
  }

  # Extract exception information
  if [log_data][exception] {
    mutate {
      add_field => {
        "exception_type" => "%{[log_data][exception][type]}"
        "exception_message" => "%{[log_data][exception][message]}"
      }
      add_tag => ["has_exception"]
    }

    # Parse stack trace
    if [log_data][exception][traceback] {
      ruby {
        code => "
          traceback = event.get('[log_data][exception][traceback]')
          if traceback.is_a?(Array)
            event.set('stack_trace', traceback.join('\n'))
          end
        "
      }
    }
  }

  # Extract API endpoint info
  if [log_data][context][endpoint] {
    mutate {
      add_field => {
        "api_endpoint" => "%{[log_data][context][endpoint]}"
        "http_method" => "%{[log_data][context][method]}"
        "http_status" => "%{[log_data][context][status_code]}"
      }
      add_tag => ["api_request"]
    }
  }

  # Extract database query info
  if [log_data][context][query] {
    mutate {
      add_field => {
        "db_operation" => "%{[log_data][context][operation]}"
        "db_table" => "%{[log_data][context][table]}"
        "db_duration_ms" => "%{[log_data][context][duration_ms]}"
      }
      add_tag => ["database_query"]
    }

    # Detect slow queries
    if [log_data][context][duration_ms] and [log_data][context][duration_ms] > 1000 {
      mutate {
        add_tag => ["slow_query"]
        add_field => { "alert_type" => "performance" }
      }
    }
  }

  # Security event detection
  if [log_data][category] == "security" or [log_data][event_type] == "security_event" {
    mutate {
      add_tag => ["security_event"]
      add_field => {
        "security_event_type" => "%{[log_data][security_event_type]}"
        "severity" => "%{[log_data][severity]:medium}"
      }
    }

    # High-severity security events
    if [log_data][severity] == "high" or [log_data][severity] == "critical" {
      mutate {
        add_tag => ["security_alert"]
        add_field => { "alert_type" => "security" }
      }
    }
  }

  # Audit trail events (HIPAA compliance)
  if [log_data][category] == "audit" or "audit" in [tags] {
    mutate {
      add_tag => ["audit_trail", "compliance_hipaa"]
      add_field => { "retention_days" => "2555" }  # 7 years
    }
  }

  # Error pattern detection
  if [level] == "ERROR" or [level] == "CRITICAL" {
    mutate {
      add_tag => ["error_log"]
    }

    # Create error signature for pattern detection
    fingerprint {
      source => ["[log_data][message]", "exception_type"]
      target => "error_signature"
      method => "SHA256"
      key => "hormonia_error_key"
      concatenate_sources => true
    }
  }

  # Performance metrics extraction
  if [log_data][event_type] == "performance_metric" {
    mutate {
      add_field => {
        "metric_name" => "%{[log_data][metric_name]}"
        "metric_value" => "%{[log_data][value]}"
        "metric_unit" => "%{[log_data][unit]}"
      }
      add_tag => ["performance_metric"]
    }
  }

  # Business events
  if [log_data][event_type] == "business_event" {
    mutate {
      add_field => {
        "business_event_type" => "%{[log_data][business_event_type]}"
        "entity_id" => "%{[log_data][entity_id]}"
      }
      add_tag => ["business_event"]
    }
  }

  # Geolocation enrichment (for IP addresses)
  if [log_data][context][client_ip] {
    geoip {
      source => "[log_data][context][client_ip]"
      target => "geoip"
      database => "/usr/share/logstash/geoip/GeoLite2-City.mmdb"
      add_tag => ["geoip"]
    }
  }

  # User-Agent parsing
  if [log_data][context][user_agent] {
    useragent {
      source => "[log_data][context][user_agent]"
      target => "user_agent"
    }
  }

  # Add calculated fields
  mutate {
    add_field => {
      "[@metadata][index_name]" => "hormonia-logs-%{environment}-%{+YYYY.MM.dd}"
    }
  }

  # Anomaly detection - flag unusual patterns
  if [db_duration_ms] and [db_duration_ms] > 5000 {
    mutate {
      add_tag => ["anomaly_detected", "performance_anomaly"]
    }
  }

  # Remove sensitive fields that shouldn't be stored
  mutate {
    remove_field => [
      "[log_data][context][password]",
      "[log_data][context][token]",
      "[log_data][context][api_key]",
      "[log_data][context][authorization]"
    ]
  }
}

output {
  # Output to Elasticsearch with proper indexing
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:localhost}:${ELASTICSEARCH_PORT:9200}"]
    user => "${ELASTICSEARCH_USERNAME:elastic}"
    password => "${ELASTICSEARCH_PASSWORD:changeme}"

    # Use metadata for index name
    index => "%{[@metadata][index_name]}"

    # ILM settings
    ilm_enabled => true
    ilm_rollover_alias => "hormonia-logs-%{environment}"
    ilm_pattern => "000001"
    ilm_policy => "hormonia-ilm-policy"

    # Pipeline for additional processing in Elasticsearch
    pipeline => "hormonia-enrich-pipeline"

    # SSL/TLS settings
    ssl => true
    ssl_certificate_verification => true
    cacert => "/etc/pki/ca/ca.crt"

    # Retry settings
    retry_on_conflict => 3

    # Performance settings
    workers => 4
  }

  # Output security events to dedicated index
  if "security_event" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:localhost}:${ELASTICSEARCH_PORT:9200}"]
      user => "${ELASTICSEARCH_USERNAME:elastic}"
      password => "${ELASTICSEARCH_PASSWORD:changeme}"
      index => "hormonia-security-%{+YYYY.MM.dd}"
      ilm_enabled => true
      ilm_rollover_alias => "hormonia-security"
      ilm_pattern => "000001"
      ilm_policy => "hormonia-security-ilm-policy"
    }
  }

  # Output audit logs to dedicated index with extended retention
  if "audit_trail" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST:localhost}:${ELASTICSEARCH_PORT:9200}"]
      user => "${ELASTICSEARCH_USERNAME:elastic}"
      password => "${ELASTICSEARCH_PASSWORD:changeme}"
      index => "hormonia-audit-%{+YYYY.MM}"
      ilm_enabled => true
      ilm_rollover_alias => "hormonia-audit"
      ilm_pattern => "000001"
      ilm_policy => "hormonia-audit-ilm-policy"  # 7-year retention
    }
  }

  # Send alerts to Redis for real-time processing
  if "security_alert" in [tags] or "performance_anomaly" in [tags] {
    redis {
      host => "${REDIS_HOST:localhost}"
      port => "${REDIS_PORT:6379}"
      password => "${REDIS_PASSWORD:}"
      data_type => "list"
      key => "alerts:logs"
      codec => json
    }
  }

  # Output to file for backup (optional)
  if "error_log" in [tags] {
    file {
      path => "/var/log/logstash/errors-%{+YYYY-MM-dd}.log"
      codec => json_lines
    }
  }

  # Stdout for debugging (disable in production)
  if "${LOGSTASH_DEBUG:false}" == "true" {
    stdout {
      codec => rubydebug
    }
  }

  # Send metrics to monitoring system
  if "performance_metric" in [tags] {
    http {
      url => "http://${PROMETHEUS_PUSHGATEWAY:localhost}:9091/metrics/job/hormonia-logs"
      http_method => "post"
      format => "json"
      codec => json
    }
  }
}