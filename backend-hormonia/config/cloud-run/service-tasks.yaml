apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hormonia-backend-tasks
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 1
      timeoutSeconds: 900
      serviceAccountName: REPLACE_WITH_RUNTIME_SA
      containers:
        - image: REPLACE_WITH_IMAGE
          ports:
            - containerPort: 8080
          env:
            - name: TASK_QUEUE_PROVIDER
              value: "cloud_tasks"
            - name: CLOUD_TASKS_PROJECT_ID
              value: "REPLACE_WITH_PROJECT_ID"
            - name: CLOUD_TASKS_LOCATION
              value: "us-central1"
            - name: CLOUD_TASKS_QUEUE
              value: "REPLACE_WITH_TASKS_QUEUE"
            - name: CLOUD_TASKS_SERVICE_URL
              value: "REPLACE_WITH_TASKS_SERVICE_URL"
            - name: CLOUD_TASKS_HANDLER_PATH
              value: "/api/v2/internal/tasks/execute"
            - name: CLOUD_TASKS_OIDC_SERVICE_ACCOUNT
              value: "REPLACE_WITH_TASKS_INVOKER_SA"
            - name: CLOUD_TASKS_AUDIENCE
              value: "REPLACE_WITH_TASKS_SERVICE_URL"
