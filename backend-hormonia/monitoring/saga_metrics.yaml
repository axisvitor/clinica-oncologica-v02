# Saga Orchestration Metrics Configuration
# Production monitoring for saga patterns, RBAC, and database constraints

metrics:
  # Saga Performance Metrics
  - name: saga_execution_time
    type: histogram
    description: Time to complete saga execution (seconds)
    buckets: [0.5, 1, 2, 5, 10, 30]
    labels:
      - saga_type
      - status

  - name: saga_success_rate
    type: gauge
    description: Percentage of successful saga executions
    labels:
      - saga_type
    target: 0.95

  - name: saga_compensation_rate
    type: gauge
    description: Percentage of sagas requiring compensation rollback
    labels:
      - saga_type
    target: 0.05

  - name: saga_retry_count
    type: counter
    description: Number of saga retry attempts
    labels:
      - saga_type
      - retry_reason

  - name: saga_step_duration
    type: histogram
    description: Duration of individual saga steps
    buckets: [0.1, 0.5, 1, 2, 5]
    labels:
      - saga_type
      - step_name

  # Database Constraint Metrics
  - name: duplicate_patient_attempts
    type: counter
    description: Attempts to create duplicate patients (blocked by constraints)
    labels:
      - constraint_type
      - identifier_type

  - name: constraint_violation_errors
    type: counter
    description: Database constraint violations
    labels:
      - constraint_name
      - table_name

  - name: unique_constraint_effectiveness
    type: gauge
    description: Percentage of duplicate attempts successfully blocked
    target: 1.0

  # RBAC Authorization Metrics
  - name: rbac_authorization_failures
    type: counter
    description: RBAC authorization failures per endpoint
    labels:
      - endpoint
      - role
      - permission_required

  - name: rbac_authorization_latency
    type: histogram
    description: Time to complete RBAC authorization check
    buckets: [0.001, 0.005, 0.01, 0.05, 0.1]
    labels:
      - endpoint

  - name: role_permission_cache_hit_rate
    type: gauge
    description: Cache hit rate for role permission checks
    target: 0.90

  # Patient Creation Metrics
  - name: patient_creation_requests
    type: counter
    description: Total patient creation requests
    labels:
      - source
      - status

  - name: patient_creation_success_rate
    type: gauge
    description: Percentage of successful patient creations
    target: 0.95

  - name: patient_validation_failures
    type: counter
    description: Patient validation failures by type
    labels:
      - validation_type

  # System Health Metrics
  - name: saga_orchestrator_health
    type: gauge
    description: Saga orchestrator health status (1=healthy, 0=unhealthy)

  - name: stuck_sagas_count
    type: gauge
    description: Number of sagas stuck in intermediate state
    target: 0

  - name: database_connection_pool_usage
    type: gauge
    description: Database connection pool utilization percentage

# Alert Rules
alerts:
  # Critical Alerts
  - name: high_saga_failure_rate
    condition: saga_success_rate < 0.95
    for: 5m
    severity: critical
    annotations:
      summary: "Saga success rate below 95%"
      description: "Saga orchestration failing at high rate. Check logs and database connectivity."
      runbook: "docs/operations/PRODUCTION_RUNBOOK.md#high-saga-failure-rate"

  - name: stuck_sagas_detected
    condition: stuck_sagas_count > 0
    for: 10m
    severity: critical
    annotations:
      summary: "Sagas stuck in intermediate state"
      description: "One or more sagas are stuck and may require manual intervention."
      runbook: "docs/operations/PRODUCTION_RUNBOOK.md#stuck-sagas"

  # High Priority Alerts
  - name: high_compensation_rate
    condition: saga_compensation_rate > 0.10
    for: 5m
    severity: high
    annotations:
      summary: "High saga compensation rate detected"
      description: "More than 10% of sagas requiring compensation. Check saga step reliability."
      runbook: "docs/operations/PRODUCTION_RUNBOOK.md#high-compensation-rate"

  - name: duplicate_patient_spike
    condition: rate(duplicate_patient_attempts[5m]) > 10
    for: 2m
    severity: high
    annotations:
      summary: "Spike in duplicate patient creation attempts"
      description: "Multiple duplicate patient attempts detected. May indicate integration issue."
      runbook: "docs/operations/PRODUCTION_RUNBOOK.md#duplicate-patient-spike"

  - name: rbac_authorization_failures_high
    condition: rate(rbac_authorization_failures[5m]) > 20
    for: 3m
    severity: high
    annotations:
      summary: "High rate of RBAC authorization failures"
      description: "Users experiencing authorization issues. Check role assignments."
      runbook: "docs/operations/PRODUCTION_RUNBOOK.md#rbac-failures"

  # Medium Priority Alerts
  - name: slow_saga_execution
    condition: histogram_quantile(0.95, saga_execution_time) > 5
    for: 10m
    severity: medium
    annotations:
      summary: "Slow saga execution detected"
      description: "P95 saga execution time exceeds 5 seconds. Check database performance."
      runbook: "docs/operations/PRODUCTION_RUNBOOK.md#slow-sagas"

  - name: constraint_violations_increasing
    condition: rate(constraint_violation_errors[15m]) > rate(constraint_violation_errors[1h])
    for: 10m
    severity: medium
    annotations:
      summary: "Increasing rate of database constraint violations"
      description: "Database constraints being violated more frequently."
      runbook: "docs/operations/PRODUCTION_RUNBOOK.md#constraint-violations"

  # Warning Alerts
  - name: patient_validation_failures
    condition: rate(patient_validation_failures[10m]) > 5
    for: 5m
    severity: warning
    annotations:
      summary: "Elevated patient validation failures"
      description: "Patient data validation failing frequently. Check data quality."
      runbook: "docs/operations/PRODUCTION_RUNBOOK.md#validation-failures"

# Dashboard Configuration
dashboards:
  - name: saga_overview
    refresh: 30s
    panels:
      - title: "Saga Success Rate"
        type: gauge
        metric: saga_success_rate
        threshold:
          critical: 0.90
          warning: 0.95

      - title: "Saga Execution Time"
        type: graph
        metrics:
          - saga_execution_time (p50)
          - saga_execution_time (p95)
          - saga_execution_time (p99)

      - title: "Compensation Rate"
        type: gauge
        metric: saga_compensation_rate
        threshold:
          warning: 0.05
          critical: 0.10

      - title: "Duplicate Patient Blocks"
        type: counter
        metric: duplicate_patient_attempts

      - title: "RBAC Failures by Endpoint"
        type: table
        metric: rbac_authorization_failures
        group_by: endpoint

      - title: "Stuck Sagas"
        type: stat
        metric: stuck_sagas_count

# Retention Policy
retention:
  metrics: 30d
  aggregated: 1y

# Export Configuration
exporters:
  - type: prometheus
    endpoint: /metrics
    port: 9090

  - type: grafana
    dashboard_path: monitoring/grafana_saga_dashboard.json

  - type: cloudwatch
    namespace: HormoniaProduction
    region: us-east-1
    enabled: false

# Logging Integration
logging:
  structured: true
  level: info
  correlation_id: enabled
  saga_tracking:
    log_all_steps: true
    log_compensations: true
    log_retries: true
