# CORS Monitoring and Alerting Configuration
# Purpose: Track CORS header validation and security across all environments
# Integration: Prometheus + Alertmanager + Grafana

###############################################################################
# Prometheus Recording Rules
###############################################################################

groups:
  - name: cors_recording_rules
    interval: 30s
    rules:
      # Total CORS preflight requests by endpoint and origin
      - record: cors:preflight_requests:rate5m
        expr: rate(http_requests_total{method="OPTIONS"}[5m])
        labels:
          job: cors_monitoring

      # CORS header presence rate
      - record: cors:header_presence:rate5m
        expr: |
          rate(http_requests_total{
            header_access_control_allow_origin!=""
          }[5m])
        labels:
          job: cors_monitoring

      # Blocked origin attempts
      - record: cors:blocked_origins:rate5m
        expr: |
          rate(http_requests_total{
            status="403",
            reason="cors_blocked"
          }[5m])
        labels:
          job: cors_monitoring

      # CORS validation success rate
      - record: cors:validation_success_rate:5m
        expr: |
          (
            sum(rate(cors_header_validation_success_total[5m]))
            /
            sum(rate(cors_header_validation_total[5m]))
          ) * 100
        labels:
          job: cors_monitoring

###############################################################################
# Prometheus Alert Rules
###############################################################################

  - name: cors_alerts
    interval: 1m
    rules:

      # Critical: CORS headers missing on production
      - alert: CORSHeaderMissing
        expr: |
          cors_header_validation_failures_total{environment="production"} > 0
        for: 5m
        labels:
          severity: critical
          component: cors
          priority: P0
        annotations:
          summary: "CORS headers missing in production"
          description: |
            CORS header validation is failing for endpoint {{ $labels.endpoint }}
            Origin: {{ $labels.origin }}
            Environment: {{ $labels.environment }}
            Value: {{ $value }} failures in last 5 minutes
          runbook_url: https://docs.example.com/runbooks/cors-header-missing
          dashboard_url: https://grafana.example.com/d/cors-monitoring

      # Critical: CORS credentials flag incorrect
      - alert: CORSCredentialsFlagIncorrect
        expr: |
          cors_credentials_flag_errors_total > 0
        for: 2m
        labels:
          severity: critical
          component: cors
          priority: P0
        annotations:
          summary: "CORS credentials flag is incorrect"
          description: |
            Access-Control-Allow-Credentials header is not set to 'true'
            Endpoint: {{ $labels.endpoint }}
            Expected: true
            Actual: {{ $labels.actual_value }}
          runbook_url: https://docs.example.com/runbooks/cors-credentials-flag

      # High: Unauthorized origin attempts spike
      - alert: UnauthorizedOriginAttempts
        expr: |
          rate(cors_blocked_origins_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: cors
          priority: P1
        annotations:
          summary: "High rate of blocked CORS origins"
          description: |
            Possible security attack or misconfigured client
            Origin: {{ $labels.origin }}
            Rate: {{ $value }} requests/sec
            Action: Review logs and consider blocking IP
          runbook_url: https://docs.example.com/runbooks/unauthorized-origins

      # Medium: CORS preflight cache inefficiency
      - alert: CORSPreflightCacheMissing
        expr: |
          cors_preflight_requests_total > (cors_actual_requests_total * 0.5)
        for: 15m
        labels:
          severity: warning
          component: cors
          priority: P2
        annotations:
          summary: "CORS preflight cache not effective"
          description: |
            High ratio of preflight to actual requests
            Preflight: {{ $value }}
            Suggests Access-Control-Max-Age is too low or not set
            Recommendation: Increase to 3600 seconds
          runbook_url: https://docs.example.com/runbooks/preflight-caching

      # Medium: CORS validation success rate low
      - alert: CORSValidationLowSuccessRate
        expr: |
          cors:validation_success_rate:5m < 95
        for: 10m
        labels:
          severity: warning
          component: cors
          priority: P2
        annotations:
          summary: "CORS validation success rate below threshold"
          description: |
            CORS validation success rate is {{ $value }}% (threshold: 95%)
            Environment: {{ $labels.environment }}
            Review CORS configuration and client requests
          runbook_url: https://docs.example.com/runbooks/cors-low-success-rate

      # Low: New origin detected
      - alert: NewOriginDetected
        expr: |
          count by (origin) (
            cors_requests_by_origin_total
            unless
            cors_requests_by_origin_total offset 24h
          ) > 0
        for: 1m
        labels:
          severity: info
          component: cors
          priority: P3
        annotations:
          summary: "New origin detected in CORS requests"
          description: |
            A new origin has been detected: {{ $labels.origin }}
            Verify this is expected and add to whitelist if legitimate
          runbook_url: https://docs.example.com/runbooks/new-origin

      # Low: CORS vary header missing
      - alert: CORSVaryHeaderMissing
        expr: |
          cors_vary_header_missing_total > 0
        for: 10m
        labels:
          severity: info
          component: cors
          priority: P3
        annotations:
          summary: "CORS Vary header missing"
          description: |
            Vary: Origin header is missing from responses
            Endpoint: {{ $labels.endpoint }}
            This can cause caching issues
          runbook_url: https://docs.example.com/runbooks/vary-header-missing

###############################################################################
# Custom Metrics Definitions
###############################################################################

  - name: cors_custom_metrics
    interval: 30s
    rules:

      # Track unique origins per hour
      - record: cors:unique_origins:1h
        expr: |
          count by (environment) (
            count_over_time(cors_requests_by_origin_total[1h])
          )

      # Track CORS errors by type
      - record: cors:errors_by_type:rate5m
        expr: |
          sum by (error_type, environment) (
            rate(cors_errors_total[5m])
          )

      # Calculate preflight overhead
      - record: cors:preflight_overhead:ratio
        expr: |
          (
            sum(rate(http_requests_total{method="OPTIONS"}[5m]))
            /
            sum(rate(http_requests_total[5m]))
          ) * 100

###############################################################################
# Alertmanager Routing Configuration
###############################################################################

# This section should be added to alertmanager.yml

route:
  group_by: ['alertname', 'environment', 'component']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'

  routes:
    # Critical CORS alerts go to PagerDuty
    - match:
        severity: critical
        component: cors
      receiver: 'pagerduty-critical'
      continue: true

    # Warning CORS alerts go to email
    - match:
        severity: warning
        component: cors
      receiver: 'email-info'
      continue: true

    # Info CORS alerts go to email
    - match:
        severity: info
        component: cors
      receiver: 'email-info'

receivers:
  - name: 'default'
    email_configs:
      - to: 'team@example.com'

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: '<PAGERDUTY_SERVICE_KEY>'
        description: '{{ .CommonAnnotations.summary }}'

  - name: 'email-info'
    email_configs:
      - to: 'devops@example.com'

