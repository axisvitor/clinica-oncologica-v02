# Prometheus Alert Rules
# Production monitoring alerts for Saga orchestration, RBAC, and database constraints

groups:
  - name: saga_critical_alerts
    interval: 30s
    rules:
      - alert: HighSagaFailureRate
        expr: saga_success_rate < 0.95
        for: 5m
        labels:
          severity: critical
          component: saga_orchestrator
          team: backend
        annotations:
          summary: "Saga success rate below 95%"
          description: "Current success rate: {{ $value | humanizePercentage }}. Saga orchestration is failing at a high rate. Check application logs and database connectivity."
          runbook_url: "https://docs.hormonia.io/runbooks/high-saga-failure-rate"
          dashboard: "https://grafana.hormonia.io/d/saga-overview"

      - alert: StuckSagasDetected
        expr: stuck_sagas_count > 0
        for: 10m
        labels:
          severity: critical
          component: saga_orchestrator
          team: backend
        annotations:
          summary: "{{ $value }} saga(s) stuck in intermediate state"
          description: "One or more sagas have been stuck for >30 minutes. Manual intervention may be required."
          runbook_url: "https://docs.hormonia.io/runbooks/stuck-sagas"

      - alert: SagaOrchestratorUnhealthy
        expr: saga_orchestrator_health == 0
        for: 2m
        labels:
          severity: critical
          component: saga_orchestrator
          team: backend
        annotations:
          summary: "Saga orchestrator health check failing"
          description: "The saga orchestrator is reporting unhealthy status. Check application health."
          runbook_url: "https://docs.hormonia.io/runbooks/saga-orchestrator-unhealthy"

  - name: saga_high_priority_alerts
    interval: 30s
    rules:
      - alert: HighCompensationRate
        expr: saga_compensation_rate > 0.10
        for: 5m
        labels:
          severity: high
          component: saga_orchestrator
          team: backend
        annotations:
          summary: "High saga compensation rate: {{ $value | humanizePercentage }}"
          description: "More than 10% of sagas are requiring compensation. Check saga step reliability and error logs."
          runbook_url: "https://docs.hormonia.io/runbooks/high-compensation-rate"

      - alert: DuplicatePatientSpike
        expr: rate(duplicate_patient_attempts[5m]) > 10
        for: 2m
        labels:
          severity: high
          component: patient_service
          team: backend
        annotations:
          summary: "Spike in duplicate patient creation attempts"
          description: "{{ $value | humanize }} duplicate patient attempts per second in the last 5 minutes. May indicate integration issue or data quality problem."
          runbook_url: "https://docs.hormonia.io/runbooks/duplicate-patient-spike"

      - alert: RBACAuthorizationFailuresHigh
        expr: rate(rbac_authorization_failures[5m]) > 20
        for: 3m
        labels:
          severity: high
          component: rbac_system
          team: backend
        annotations:
          summary: "High rate of RBAC authorization failures"
          description: "{{ $value | humanize }} authorization failures per second. Users may be experiencing access issues. Check role assignments and permissions."
          runbook_url: "https://docs.hormonia.io/runbooks/rbac-failures"

      - alert: DatabaseConstraintViolationsIncreasing
        expr: rate(constraint_violation_errors[5m]) > 5
        for: 5m
        labels:
          severity: high
          component: database
          team: backend
        annotations:
          summary: "Increasing database constraint violations"
          description: "{{ $value | humanize }} constraint violations per second. Data integrity may be at risk."
          runbook_url: "https://docs.hormonia.io/runbooks/constraint-violations"

  - name: saga_medium_priority_alerts
    interval: 1m
    rules:
      - alert: SlowSagaExecution
        expr: histogram_quantile(0.95, rate(saga_execution_time_bucket[10m])) > 5
        for: 10m
        labels:
          severity: medium
          component: saga_orchestrator
          team: backend
        annotations:
          summary: "Slow saga execution detected"
          description: "P95 saga execution time is {{ $value | humanizeDuration }}. Target is <3s. Check database performance and saga step efficiency."
          runbook_url: "https://docs.hormonia.io/runbooks/slow-sagas"

      - alert: SagaRetryRateHigh
        expr: rate(saga_retry_count[10m]) > 1
        for: 10m
        labels:
          severity: medium
          component: saga_orchestrator
          team: backend
        annotations:
          summary: "High saga retry rate"
          description: "{{ $value | humanize }} saga retries per second. Indicates transient failures in saga execution."
          runbook_url: "https://docs.hormonia.io/runbooks/high-retry-rate"

  - name: saga_warning_alerts
    interval: 5m
    rules:
      - alert: PatientValidationFailures
        expr: rate(patient_validation_failures[10m]) > 5
        for: 5m
        labels:
          severity: warning
          component: patient_service
          team: backend
        annotations:
          summary: "Elevated patient validation failures"
          description: "{{ $value | humanize }} validation failures per second. Check data quality and validation rules."
          runbook_url: "https://docs.hormonia.io/runbooks/validation-failures"

      - alert: RBACAuthorizationLatencyHigh
        expr: histogram_quantile(0.95, rate(rbac_authorization_latency_bucket[10m])) > 0.050
        for: 10m
        labels:
          severity: warning
          component: rbac_system
          team: backend
        annotations:
          summary: "High RBAC authorization latency"
          description: "P95 authorization latency is {{ $value | humanizeDuration }}. Target is <10ms. Check role cache and database performance."
          runbook_url: "https://docs.hormonia.io/runbooks/rbac-latency"

      - alert: DatabaseConnectionPoolHighUsage
        expr: database_connection_pool_usage > 80
        for: 10m
        labels:
          severity: warning
          component: database
          team: backend
        annotations:
          summary: "Database connection pool at {{ $value }}% capacity"
          description: "Connection pool usage is high. May need to increase pool size or investigate connection leaks."
          runbook_url: "https://docs.hormonia.io/runbooks/db-pool-usage"

  - name: business_metrics_alerts
    interval: 5m
    rules:
      - alert: PatientCreationSuccessRateLow
        expr: patient_creation_success_rate < 0.95
        for: 15m
        labels:
          severity: high
          component: patient_service
          team: backend
        annotations:
          summary: "Patient creation success rate below 95%"
          description: "Current success rate: {{ $value | humanizePercentage }}. Users may be unable to create patients."
          runbook_url: "https://docs.hormonia.io/runbooks/patient-creation-failures"

      - alert: NoPatientCreationsRecently
        expr: rate(patient_creation_requests[30m]) == 0
        for: 30m
        labels:
          severity: medium
          component: patient_service
          team: backend
        annotations:
          summary: "No patient creations in the last 30 minutes"
          description: "This may be normal during off-hours, but verify system is functional."
          runbook_url: "https://docs.hormonia.io/runbooks/no-activity"

  - name: constraint_effectiveness_alerts
    interval: 5m
    rules:
      - alert: ConstraintEffectivenessLow
        expr: unique_constraint_effectiveness < 1.0
        for: 5m
        labels:
          severity: critical
          component: database
          team: backend
        annotations:
          summary: "Database constraints not fully effective"
          description: "One or more critical constraints are missing or disabled. Data integrity at risk."
          runbook_url: "https://docs.hormonia.io/runbooks/missing-constraints"

  - name: system_health_alerts
    interval: 1m
    rules:
      - alert: HealthCheckFailing
        expr: up{job="backend-api"} == 0
        for: 2m
        labels:
          severity: critical
          component: application
          team: backend
        annotations:
          summary: "Backend API health check failing"
          description: "Application is not responding to health checks. Service may be down."
          runbook_url: "https://docs.hormonia.io/runbooks/health-check-failure"

      - alert: DetailedHealthCheckDegraded
        expr: health_status{type="detailed"} != 1
        for: 5m
        labels:
          severity: high
          component: application
          team: backend
        annotations:
          summary: "Detailed health check showing degraded status"
          description: "One or more system components are unhealthy. Check /health/detailed endpoint for details."
          runbook_url: "https://docs.hormonia.io/runbooks/degraded-health"

# Recording Rules for Pre-computed Metrics
  - name: saga_recording_rules
    interval: 30s
    rules:
      - record: saga_success_rate:5m
        expr: |
          sum(rate(saga_execution_count{status="completed"}[5m]))
          /
          sum(rate(saga_execution_count[5m]))

      - record: saga_compensation_rate:5m
        expr: |
          sum(rate(saga_execution_count{status="compensated"}[5m]))
          /
          sum(rate(saga_execution_count[5m]))

      - record: patient_creation_success_rate:5m
        expr: |
          sum(rate(patient_creation_requests{status="success"}[5m]))
          /
          sum(rate(patient_creation_requests[5m]))
