# Alertmanager Configuration for P0 Critical Alerts
# Integrated with Slack, Email, and PagerDuty
# Last Updated: 2025-11-15

global:
  # Default configuration
  resolve_timeout: 5m

  # Slack configuration
  slack_api_url: '${SLACK_WEBHOOK_URL}'

  # Email configuration (SMTP)
  smtp_from: 'alerts@hormonia.io'
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

  # PagerDuty configuration
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# Alert routing tree
route:
  # Default receiver for all alerts
  receiver: 'default-receiver'

  # Group alerts by these labels
  group_by: ['alertname', 'severity', 'component']

  # Wait time before sending notification for grouped alerts
  group_wait: 30s

  # Time to wait before sending notification about new alerts in same group
  group_interval: 5m

  # Minimum time between two notifications for same alert
  repeat_interval: 4h

  # Child routes for specific alert types
  routes:
    # ========================================================================
    # P0 CRITICAL ALERTS - IMMEDIATE ESCALATION
    # ========================================================================
    - match:
        priority: p0
        severity: critical
      receiver: 'p0-critical'
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 15m
      continue: true
      routes:
        # Saga timeout breaches - highest priority
        - match:
            incident_type: timeout
          receiver: 'p0-saga-timeout'
          group_wait: 5s
          repeat_interval: 10m

        # Race conditions - immediate engineering escalation
        - match:
            incident_type: race_condition
          receiver: 'p0-race-condition'
          group_wait: 5s
          repeat_interval: 10m

        # Data integrity issues
        - match:
            incident_type: data_integrity
          receiver: 'p0-data-integrity'
          group_wait: 10s
          repeat_interval: 15m

        # Error spikes
        - match:
            incident_type: error_spike
          receiver: 'p0-error-spike'
          group_wait: 15s
          repeat_interval: 20m

    # ========================================================================
    # P0 HIGH PRIORITY ALERTS
    # ========================================================================
    - match:
        priority: p0
        severity: high
      receiver: 'p0-high'
      group_wait: 30s
      group_interval: 3m
      repeat_interval: 1h
      routes:
        # Performance degradation
        - match:
            incident_type: performance
          receiver: 'p0-performance'
          group_wait: 1m
          repeat_interval: 30m

        # Resource constraints
        - match:
            incident_type: resource
          receiver: 'p0-resource'
          group_wait: 2m
          repeat_interval: 45m

    # ========================================================================
    # P0 MEDIUM/WARNING ALERTS
    # ========================================================================
    - match:
        priority: p0
        severity: medium
      receiver: 'p0-medium'
      group_wait: 2m
      group_interval: 10m
      repeat_interval: 4h

    - match:
        priority: p0
        severity: warning
      receiver: 'p0-warning'
      group_wait: 5m
      group_interval: 15m
      repeat_interval: 12h

    # ========================================================================
    # BUSINESS HOURS VS OFF-HOURS
    # ========================================================================
    - match:
        priority: p0
      receiver: 'p0-business-hours'
      active_time_intervals:
        - business-hours
      continue: true

    - match:
        priority: p0
        severity: critical
      receiver: 'p0-off-hours'
      active_time_intervals:
        - off-hours

# Time intervals for business hours routing
time_intervals:
  - name: business-hours
    time_intervals:
      - times:
          - start_time: '09:00'
            end_time: '18:00'
        weekdays: ['monday:friday']
        location: 'America/Sao_Paulo'

  - name: off-hours
    time_intervals:
      - times:
          - start_time: '18:00'
            end_time: '09:00'
        weekdays: ['monday:friday']
        location: 'America/Sao_Paulo'
      - weekdays: ['saturday', 'sunday']
        location: 'America/Sao_Paulo'

# Alert receivers configuration
receivers:
  # ========================================================================
  # DEFAULT RECEIVER
  # ========================================================================
  - name: 'default-receiver'
    slack_configs:
      - channel: '#alerts-general'
        title: 'Alert: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true

  # ========================================================================
  # P0 CRITICAL RECEIVERS
  # ========================================================================
  - name: 'p0-critical'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_P0_CRITICAL_KEY}'
        severity: 'critical'
        description: 'P0 CRITICAL: {{ .GroupLabels.alertname }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'
          component: '{{ .GroupLabels.component }}'
          summary: '{{ range .Alerts.Firing }}{{ .Annotations.summary }}{{ end }}'
        client: 'Hormonia Monitoring'
        client_url: 'https://grafana.hormonia.io/d/p0-monitoring'
    slack_configs:
      - channel: '#p0-critical-alerts'
        username: 'P0 Alert Bot'
        icon_emoji: ':rotating_light:'
        title: ':rotating_light: P0 CRITICAL ALERT :rotating_light:'
        title_link: 'https://grafana.hormonia.io/d/p0-monitoring'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .GroupLabels.severity }}
          *Component:* {{ .GroupLabels.component }}
          *Incident Type:* {{ .GroupLabels.incident_type }}

          {{ range .Alerts.Firing }}
          *Description:* {{ .Annotations.description }}
          *Action Required:* {{ .Annotations.action_required }}
          *Runbook:* {{ .Annotations.runbook_url }}
          {{ end }}
        send_resolved: true
        actions:
          - type: button
            text: 'View Dashboard'
            url: 'https://grafana.hormonia.io/d/p0-monitoring'
          - type: button
            text: 'View Runbook'
            url: '{{ (index .Alerts 0).Annotations.runbook_url }}'
    email_configs:
      - to: '${P0_ONCALL_EMAIL}'
        headers:
          Subject: 'P0 CRITICAL: {{ .GroupLabels.alertname }}'
        html: |
          <h2 style="color: red;">P0 CRITICAL ALERT</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
          <p><strong>Component:</strong> {{ .GroupLabels.component }}</p>
          {{ range .Alerts.Firing }}
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Action Required:</strong><br><pre>{{ .Annotations.action_required }}</pre></p>
          <p><a href="{{ .Annotations.runbook_url }}">View Runbook</a> | <a href="{{ .Annotations.dashboard }}">View Dashboard</a></p>
          {{ end }}
        send_resolved: true

  # ========================================================================
  # SPECIALIZED P0 RECEIVERS
  # ========================================================================
  - name: 'p0-saga-timeout'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_P0_CRITICAL_KEY}'
        severity: 'critical'
        description: 'P0 CRITICAL: Saga Timeout Breach'
    slack_configs:
      - channel: '#p0-saga-alerts'
        username: 'Saga Monitor'
        icon_emoji: ':warning:'
        title: ':warning: SAGA TIMEOUT BREACH'
        text: |
          {{ range .Alerts.Firing }}
          {{ .Annotations.description }}

          **IMMEDIATE ACTION:**
          {{ .Annotations.action_required }}
          {{ end }}
        send_resolved: true

  - name: 'p0-race-condition'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_P0_CRITICAL_KEY}'
        severity: 'critical'
        description: 'P0 CRITICAL: Race Condition Detected'
    slack_configs:
      - channel: '#p0-engineering-critical'
        username: 'Engineering Alert'
        icon_emoji: ':rotating_light:'
        title: ':rotating_light: RACE CONDITION REGRESSION'
        text: |
          {{ range .Alerts.Firing }}
          {{ .Annotations.description }}

          **CRITICAL REGRESSION - IMMEDIATE ESCALATION:**
          {{ .Annotations.action_required }}
          {{ end }}
        send_resolved: true

  - name: 'p0-data-integrity'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_P0_CRITICAL_KEY}'
        severity: 'critical'
        description: 'P0 CRITICAL: Data Integrity Risk'
    slack_configs:
      - channel: '#p0-data-integrity'
        username: 'Data Integrity Monitor'
        icon_emoji: ':warning:'
        title: ':warning: DATA INTEGRITY RISK'
        text: |
          {{ range .Alerts.Firing }}
          {{ .Annotations.description }}

          **MANUAL INTERVENTION REQUIRED:**
          {{ .Annotations.action_required }}
          {{ end }}
        send_resolved: true

  - name: 'p0-error-spike'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_P0_HIGH_KEY}'
        severity: 'error'
        description: 'P0 CRITICAL: Error Rate Spike'
    slack_configs:
      - channel: '#p0-error-alerts'
        username: 'Error Monitor'
        icon_emoji: ':fire:'
        title: ':fire: ERROR RATE SPIKE'
        text: |
          {{ range .Alerts.Firing }}
          {{ .Annotations.description }}
          {{ .Annotations.action_required }}
          {{ end }}
        send_resolved: true

  # ========================================================================
  # P0 HIGH PRIORITY RECEIVERS
  # ========================================================================
  - name: 'p0-high'
    slack_configs:
      - channel: '#p0-high-alerts'
        username: 'P0 Alert Bot'
        icon_emoji: ':warning:'
        title: 'P0 HIGH PRIORITY ALERT'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Component:* {{ .GroupLabels.component }}
          {{ range .Alerts.Firing }}
          *Description:* {{ .Annotations.description }}
          *Action:* {{ .Annotations.action_required }}
          {{ end }}
        send_resolved: true
    email_configs:
      - to: '${P0_TEAM_EMAIL}'
        headers:
          Subject: 'P0 HIGH: {{ .GroupLabels.alertname }}'

  - name: 'p0-performance'
    slack_configs:
      - channel: '#p0-performance'
        title: 'Performance Degradation'
        send_resolved: true

  - name: 'p0-resource'
    slack_configs:
      - channel: '#p0-resources'
        title: 'Resource Constraint'
        send_resolved: true

  # ========================================================================
  # P0 MEDIUM/WARNING RECEIVERS
  # ========================================================================
  - name: 'p0-medium'
    slack_configs:
      - channel: '#p0-medium-alerts'
        send_resolved: true

  - name: 'p0-warning'
    slack_configs:
      - channel: '#p0-warnings'
        send_resolved: true

  # ========================================================================
  # TIME-BASED RECEIVERS
  # ========================================================================
  - name: 'p0-business-hours'
    slack_configs:
      - channel: '#p0-business-hours'
        send_resolved: true

  - name: 'p0-off-hours'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_P0_ONCALL_KEY}'
        severity: 'critical'
    slack_configs:
      - channel: '#p0-oncall'
        send_resolved: true

# Inhibition rules - prevent notification spam
inhibit_rules:
  # Inhibit warning/medium alerts when critical is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']

  - source_match:
      severity: 'critical'
    target_match:
      severity: 'medium'
    equal: ['alertname', 'component']

  - source_match:
      severity: 'high'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']

  # Inhibit saga-related alerts when saga orchestrator is unhealthy
  - source_match:
      alertname: 'P0_SagaTimeoutBreach'
    target_match_re:
      alertname: '^P0_Saga.*'
    equal: ['component']

  # Inhibit downstream alerts when event loop is blocked
  - source_match:
      alertname: 'P0_EventLoopBlocked'
    target_match_re:
      alertname: '^P0_(HTTPRequestLatency|PerformanceDegradation).*'
    equal: ['component']
