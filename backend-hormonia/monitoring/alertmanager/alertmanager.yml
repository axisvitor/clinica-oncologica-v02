# Alertmanager configuration for routing quiz alerts

global:
  resolve_timeout: 5m
# Templates for custom alert messages
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routing tree
route:
  # Default receiver
  receiver: 'default-receiver'

  # Group alerts by these labels
  group_by: ['alertname', 'cluster', 'service']

  # Wait time before sending first notification
  group_wait: 10s

  # Wait time before sending additional notifications for alerts in same group
  group_interval: 5m

  # Wait time before re-sending notification if alert still firing
  repeat_interval: 3h

  # Child routes for specific alert routing
  routes:
    # Critical alerts -> PagerDuty
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      continue: true

    # Warning alerts -> Email
    - match:
        severity: warning
      receiver: 'email-info'

    # Info alerts → Email
    - match:
        severity: info
      receiver: 'email-info'

# Alert receivers
receivers:
  # Default receiver (logs only)
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true

  # PagerDuty for critical alerts
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        description: '{{ .CommonAnnotations.summary }}'
        details:
          severity: '{{ .CommonLabels.severity }}'
          alert_url: '{{ .CommonAnnotations.dashboard }}'
          runbook: '{{ .CommonAnnotations.runbook }}'

  # Email for info alerts
  - name: 'email-info'
    email_configs:
      - to: 'devops@example.com'
        from: 'alertmanager@hormonia.com'
        smarthost: 'smtp.example.com:587'
        auth_username: 'alertmanager@hormonia.com'
        auth_password: 'YOUR_SMTP_PASSWORD'
        headers:
          Subject: '[Hormonia] {{ .CommonLabels.alertname }}'
        text: |
          Alert: {{ .CommonLabels.alertname }}
          Severity: {{ .CommonLabels.severity }}

          {{ .CommonAnnotations.description }}

# Inhibition rules (suppress alerts based on other active alerts)
inhibit_rules:
  # Don't alert on send latency if Redis is down
  - source_match:
      alertname: 'RedisMetricsUnavailable'
    target_match:
      alertname: 'HighQuizSendLatency'
    equal: ['service']

  # Don't alert on abandonment if completions are zero
  - source_match:
      alertname: 'ZeroCompletionsIn24Hours'
    target_match:
      alertname: 'HighQuizAbandonmentRate'
    equal: ['template_id']

  # Suppress warning if critical alert is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']
