# Firebase Admin SDK alert rules
# Place in Prometheus config: rule_files: ["/etc/prometheus/rules/firebase_admin_sdk_alerts.yml"]

groups:
  - name: firebase_admin_sdk_alerts
    interval: 30s
    rules:
      - alert: FirebaseAdminSDKSlow
        expr: histogram_quantile(0.95, rate(firebase_admin_sdk_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Firebase Admin SDK calls are taking longer than expected"
          description: "Firebase Admin SDK p95 duration is {{ $value }}s"
          action: "Investigate Firebase API performance or increase timeout"

      - alert: FirebaseAdminSDKTimeoutRateHigh
        expr: rate(firebase_admin_sdk_timeout_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High rate of Firebase Admin SDK timeouts"
          description: "Timeout rate is {{ $value }} per second"
          action: "Check Firebase API status or network connectivity"

      - alert: FirebaseAdminSDKErrorRateHigh
        expr: rate(firebase_admin_sdk_error_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High rate of Firebase Admin SDK errors"
          description: "Error rate is {{ $value }} per second"
          action: "Check Firebase credentials and API status"
