# Prometheus Alert Rules for Clínica Hormonia
# Critical, Warning, and Info level alerts

groups:
  # Critical Alerts - Immediate Response Required (PagerDuty)
  - name: critical_alerts
    interval: 30s
    rules:
      - alert: HighAPIResponseTime
        expr: histogram_quantile(0.95, rate(app_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: critical
          channel: pagerduty
        annotations:
          summary: "API response time above 2 seconds"
          description: "95th percentile API response time is {{ $value }}s for endpoint {{ $labels.endpoint }}"

      - alert: HighErrorRate
        expr: rate(app_requests_total{status=~"5.."}[5m]) / rate(app_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          channel: pagerduty
        annotations:
          summary: "Error rate above 5%"
          description: "Error rate is {{ $value | humanizePercentage }} for endpoint {{ $labels.endpoint }}"

      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.9
        for: 5m
        labels:
          severity: critical
          channel: pagerduty
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "{{ $value | humanizePercentage }} of database connections in use"

      - alert: CeleryQueueOverloaded
        expr: celery_queue_length > 1000
        for: 10m
        labels:
          severity: critical
          channel: pagerduty
        annotations:
          summary: "Celery queue size exceeds 1000"
          description: "Queue {{ $labels.queue }} has {{ $value }} pending tasks"

      - alert: VirusDetected
        expr: increase(app_virus_detected_total[1m]) > 0
        for: 0m
        labels:
          severity: critical
          channel: pagerduty
        annotations:
          summary: "SECURITY: Virus detected in file upload"
          description: "{{ $value }} virus(es) detected. Immediate investigation required."

      - alert: ApplicationDown
        expr: up{job="hormonia-app"} == 0
        for: 1m
        labels:
          severity: critical
          channel: pagerduty
        annotations:
          summary: "Application instance is down"
          description: "Application {{ $labels.instance }} is unreachable"

      - alert: DatabaseDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          channel: pagerduty
        annotations:
          summary: "PostgreSQL database is down"
          description: "Database {{ $labels.instance }} is unreachable"

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
          channel: pagerduty
        annotations:
          summary: "Redis instance is down"
          description: "Redis {{ $labels.instance }} is unreachable"

  # Warning Alerts - Action Required Soon (Email)
  - name: warning_alerts
    interval: 1m
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
          channel: email
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value | humanize }}% on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
          channel: email
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value | humanize }}% on {{ $labels.instance }}"

      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
          channel: email
        annotations:
          summary: "Disk usage above 90%"
          description: "Disk {{ $labels.mountpoint }} is {{ $value | humanize }}% full"

      - alert: LowRedisCacheHitRate
        expr: rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m])) < 0.7
        for: 15m
        labels:
          severity: warning
          channel: email
        annotations:
          summary: "Redis cache hit rate below 70%"
          description: "Cache hit rate is {{ $value | humanizePercentage }}"

      - alert: LowQuizCompletionRate
        expr: app_quiz_completion_rate < 0.6
        for: 1h
        labels:
          severity: warning
          channel: email
        annotations:
          summary: "Quiz completion rate below 60%"
          description: "Only {{ $value | humanizePercentage }} of quizzes are being completed"

      - alert: HighSecurityScanFailures
        expr: rate(app_security_scan_total{result="failure"}[10m]) > 5
        for: 5m
        labels:
          severity: warning
          channel: email
        annotations:
          summary: "High rate of security scan failures"
          description: "{{ $value }} security scans failing per second"

      - alert: SlowDatabaseQueries
        expr: histogram_quantile(0.95, rate(app_db_query_duration_seconds_bucket[5m])) > 1
        for: 10m
        labels:
          severity: warning
          channel: email
        annotations:
          summary: "Slow database queries detected"
          description: "95th percentile query time is {{ $value }}s for {{ $labels.query }}"

      - alert: HighMIMEValidationFailures
        expr: rate(app_mime_validation_failures_total[10m]) > 10
        for: 5m
        labels:
          severity: warning
          channel: email
        annotations:
          summary: "High rate of MIME validation failures"
          description: "{{ $value }} MIME validation failures per second"

  # Info Alerts - Informational (Email)
  - name: info_alerts
    interval: 5m
    rules:
      - alert: DailySummary
        expr: hour() == 8 and minute() < 5
        for: 1m
        labels:
          severity: info
          channel: email
        annotations:
          summary: "Daily system summary report"
          description: "Automated daily summary of system metrics"

      - alert: HighQuotaUsage
        expr: app_quota_usage_bytes / app_quota_limit_bytes > 0.8
        for: 1h
        labels:
          severity: info
          channel: email
        annotations:
          summary: "User approaching quota limit"
          description: "User {{ $labels.user }} has used {{ $value | humanizePercentage }} of quota"

      - alert: LowActiveUsers
        expr: app_active_users_total < 10
        for: 2h
        labels:
          severity: info
          channel: email
        annotations:
          summary: "Low active user count"
          description: "Only {{ $value }} active users in the last hour"

      - alert: HighNotificationVolume
        expr: rate(app_notifications_sent_total[1h]) > 100
        for: 30m
        labels:
          severity: info
          channel: email
        annotations:
          summary: "High notification send rate"
          description: "{{ $value }} notifications sent per second via {{ $labels.channel }}"

  # SLA Compliance Alerts
  - name: sla_alerts
    interval: 5m
    rules:
      - alert: SLAViolation
        expr: app_sla_compliance_ratio < 0.95
        for: 15m
        labels:
          severity: warning
          channel: email
        annotations:
          summary: "SLA compliance below 95%"
          description: "Current SLA compliance is {{ $value | humanizePercentage }}"

      - alert: UptimeBelow99
        expr: avg_over_time(up{job="hormonia-app"}[24h]) < 0.99
        for: 5m
        labels:
          severity: warning
          channel: email
        annotations:
          summary: "24h uptime below 99%"
          description: "Application uptime is {{ $value | humanizePercentage }}"
