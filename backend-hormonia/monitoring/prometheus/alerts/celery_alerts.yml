# Celery Monitoring Alert Rules
# Comprehensive alerting for Celery task health and performance

groups:
  - name: celery_task_alerts
    interval: 30s
    rules:
      # ========================================================================
      # CRITICAL ALERTS
      # ========================================================================

      - alert: CeleryWorkerDown
        expr: |
          up{job="celery_worker"} == 0
        for: 1m
        labels:
          severity: critical
          component: celery
          category: availability
        annotations:
          summary: "Celery worker is down"
          description: "Celery worker {{ $labels.instance }} is not responding for 1 minute"
          impact: "Tasks cannot be processed, system degradation"
          action: "Check worker logs, restart worker, verify Redis connection"

      - alert: CeleryAllWorkersDown
        expr: |
          sum(celery_worker_active) == 0
        for: 2m
        labels:
          severity: critical
          component: celery
          category: availability
        annotations:
          summary: "All Celery workers are down"
          description: "No active Celery workers detected for 2 minutes"
          impact: "Complete task processing failure, system outage"
          action: "IMMEDIATE: Check worker containers, Redis, broker connectivity"

      - alert: CeleryTaskStuck
        expr: |
          celery_task_active > 0 and
          rate(celery_task_total[5m]) == 0
        for: 10m
        labels:
          severity: critical
          component: celery
          category: performance
        annotations:
          summary: "Celery task appears stuck"
          description: "Task {{ $labels.task_name }} has been running for >10min without completion"
          impact: "Task may be deadlocked, blocking other tasks"
          action: "Review task logs, check for infinite loops, revoke task if necessary"

      - alert: CeleryQueueCriticalBacklog
        expr: |
          celery_queue_length > 5000
        for: 5m
        labels:
          severity: critical
          component: celery
          category: capacity
        annotations:
          summary: "Critical Celery queue backlog"
          description: "Queue {{ $labels.queue_name }} has {{ $value }} pending tasks (>5000)"
          impact: "Severe task processing delay, possible memory issues"
          action: "Scale workers, investigate task failures, check Redis memory"

      # ========================================================================
      # WARNING ALERTS
      # ========================================================================

      - alert: CeleryTaskHighFailureRate
        expr: |
          sum(rate(celery_task_failures_total[5m])) by (task_name) > 0.1
        for: 5m
        labels:
          severity: warning
          component: celery
          category: reliability
        annotations:
          summary: "High Celery task failure rate"
          description: "Task {{ $labels.task_name }} has failure rate > 0.1/min ({{ $value | humanize }})"
          impact: "Reduced task success rate, potential data processing issues"
          action: "Check task logs for errors, review task implementation"

      - alert: CeleryTaskHighRetryRate
        expr: |
          sum(rate(celery_task_retries_total[5m])) by (task_name) > 0.5
        for: 5m
        labels:
          severity: warning
          component: celery
          category: reliability
        annotations:
          summary: "High Celery task retry rate"
          description: "Task {{ $labels.task_name }} has retry rate > 0.5/min ({{ $value | humanize }})"
          impact: "Increased processing time, potential underlying service issues"
          action: "Investigate retry causes, check external service dependencies"

      - alert: CeleryQueueBacklog
        expr: |
          celery_queue_length > 1000
        for: 5m
        labels:
          severity: warning
          component: celery
          category: capacity
        annotations:
          summary: "Large Celery queue backlog"
          description: "Queue {{ $labels.queue_name }} has {{ $value }} pending tasks"
          impact: "Delayed task processing, potential SLA violations"
          action: "Consider scaling workers, review task priority"

      - alert: CeleryTaskSlowExecution
        expr: |
          histogram_quantile(0.95, sum(rate(celery_task_duration_seconds_bucket[5m])) by (task_name, le)) > 60
        for: 10m
        labels:
          severity: warning
          component: celery
          category: performance
        annotations:
          summary: "Celery task slow execution (P95)"
          description: "Task {{ $labels.task_name }} P95 duration is {{ $value | humanizeDuration }} (>60s)"
          impact: "Degraded user experience, worker congestion"
          action: "Profile task, optimize database queries, add caching"

      - alert: CeleryHighTaskConcurrency
        expr: |
          sum(celery_task_active) by (task_name) > 50
        for: 5m
        labels:
          severity: warning
          component: celery
          category: capacity
        annotations:
          summary: "High Celery task concurrency"
          description: "{{ $value }} instances of {{ $labels.task_name }} running concurrently"
          impact: "Potential resource exhaustion, rate limiting issues"
          action: "Review task rate limits, check for task duplication"

      # ========================================================================
      # INFORMATIONAL ALERTS
      # ========================================================================

      - alert: CeleryLowSuccessRate
        expr: |
          (
            sum(increase(celery_task_total{status="success"}[1h])) by (task_name) /
            sum(increase(celery_task_total[1h])) by (task_name)
          ) < 0.95
        for: 15m
        labels:
          severity: info
          component: celery
          category: reliability
        annotations:
          summary: "Low Celery task success rate"
          description: "Task {{ $labels.task_name }} success rate is {{ $value | humanizePercentage }} (<95%)"
          impact: "Some tasks failing, reduced reliability"
          action: "Monitor trend, investigate if drops further"

      - alert: CeleryTaskRejected
        expr: |
          increase(celery_task_rejected_total[5m]) > 0
        for: 1m
        labels:
          severity: info
          component: celery
          category: capacity
        annotations:
          summary: "Celery tasks being rejected"
          description: "{{ $value }} tasks of type {{ $labels.task_name }} rejected in last 5min"
          impact: "Tasks not processed, possible worker overload"
          action: "Check worker capacity, review task rate limiting"

      - alert: CeleryTaskRevoked
        expr: |
          increase(celery_task_revoked_total[5m]) > 10
        for: 1m
        labels:
          severity: info
          component: celery
          category: operations
        annotations:
          summary: "Multiple Celery tasks revoked"
          description: "{{ $value }} tasks of type {{ $labels.task_name }} revoked in last 5min"
          impact: "Tasks cancelled, possible operational intervention"
          action: "Review revocation reason, check for manual interventions"

      # ========================================================================
      # REDIS BROKER ALERTS
      # ========================================================================

      - alert: CeleryRedisConnectionFailure
        expr: |
          up{job="redis",instance=~".*celery.*"} == 0
        for: 1m
        labels:
          severity: critical
          component: redis
          category: availability
        annotations:
          summary: "Celery Redis broker is down"
          description: "Redis broker {{ $labels.instance }} is unreachable"
          impact: "Complete task processing failure"
          action: "IMMEDIATE: Check Redis service, verify network connectivity"

      - alert: CeleryRedisHighMemory
        expr: |
          redis_memory_used_bytes{instance=~".*celery.*"} / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          component: redis
          category: capacity
        annotations:
          summary: "Celery Redis broker high memory usage"
          description: "Redis broker {{ $labels.instance }} using {{ $value | humanizePercentage }} of max memory"
          impact: "Risk of message loss, broker instability"
          action: "Increase Redis memory, clear old tasks, check for memory leaks"

      # ========================================================================
      # BUSINESS LOGIC ALERTS
      # ========================================================================

      - alert: CeleryQuizFlowFailures
        expr: |
          sum(rate(celery_task_failures_total{task_name=~".*quiz.*"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          component: celery
          category: business_logic
        annotations:
          summary: "Quiz flow task failures detected"
          description: "Quiz-related tasks failing at {{ $value | humanize }}/min"
          impact: "Patient quiz responses may not be processed"
          action: "Check quiz service logs, verify database connectivity"

      - alert: CeleryWhatsAppFailures
        expr: |
          sum(rate(celery_task_failures_total{task_name=~".*whatsapp.*"}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
          component: celery
          category: business_logic
        annotations:
          summary: "WhatsApp message sending failures"
          description: "WhatsApp tasks failing at {{ $value | humanize }}/min"
          impact: "Patient messages not being delivered"
          action: "Check Evolution API status, verify WhatsApp credentials"
