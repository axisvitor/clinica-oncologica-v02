groups:
  # ============================================================================
  # SECURITY ALERTS
  # ============================================================================
  - name: security
    interval: 30s
    rules:
      - alert: HighFailedAuthRate
        expr: rate(auth_failed_total[5m]) > 10
        for: 5m
        labels:
          severity: critical
          category: security
        annotations:
          summary: "High failed authentication rate detected"
          description: "More than 10 failed authentication attempts per second in the last 5 minutes. Possible brute force attack."
          action: "Review authentication logs and consider IP blocking"

      - alert: SQLInjectionAttempt
        expr: rate(sql_injection_attempts_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          category: security
        annotations:
          summary: "SQL injection attempt detected"
          description: "SQL injection pattern detected in request parameters"
          action: "Immediately review security logs and block suspicious IPs"

      - alert: WebhookSignatureFailures
        expr: rate(webhook_signature_failures_total[5m]) > 5
        for: 5m
        labels:
          severity: high
          category: security
        annotations:
          summary: "High webhook signature failure rate"
          description: "More than 5 webhook signature validation failures per second"
          action: "Review webhook configurations and validate signature keys"

      - alert: UnauthorizedAccessSpike
        expr: rate(unauthorized_access_total[5m]) > 20
        for: 5m
        labels:
          severity: high
          category: security
        annotations:
          summary: "Spike in unauthorized access attempts"
          description: "More than 20 unauthorized access attempts per second"
          action: "Review RBAC configurations and access logs"

      - alert: CSRFFailures
        expr: rate(csrf_failures_total[5m]) > 5
        for: 5m
        labels:
          severity: medium
          category: security
        annotations:
          summary: "CSRF validation failures detected"
          description: "More than 5 CSRF validation failures per second"
          action: "Review CSRF token implementation and client configurations"

  # ============================================================================
  # PERFORMANCE ALERTS
  # ============================================================================
  - name: performance
    interval: 30s
    rules:
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "High HTTP response time"
          description: "95th percentile response time is above 2 seconds"
          action: "Review slow endpoints and optimize queries"

      - alert: SlowDatabaseQueries
        expr: histogram_quantile(0.95, rate(db_query_duration_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Slow database queries detected"
          description: "95th percentile database query time is above 1 second"
          action: "Review query execution plans and add missing indexes"

      - alert: LowCacheHitRate
        expr: cache_hit_rate < 70
        for: 10m
        labels:
          severity: warning
          category: performance
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate below 70% for extended period"
          action: "Review cache configuration and TTL settings"

      - alert: N1QueryDetected
        expr: rate(n1_query_detected_total[5m]) > 1
        for: 2m
        labels:
          severity: high
          category: performance
        annotations:
          summary: "N+1 query pattern detected"
          description: "N+1 query anti-pattern detected in application"
          action: "Review ORM queries and implement eager loading"

      - alert: HighErrorRate
        expr: rate(http_request_duration_seconds_count{status_code=~"5.."}[5m]) / rate(http_request_duration_seconds_count[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          category: performance
        annotations:
          summary: "High error rate detected"
          description: "More than 5% of requests are failing with 5xx errors"
          action: "Review application logs and fix critical errors"

  # ============================================================================
  # BUSINESS LOGIC ALERTS
  # ============================================================================
  - name: business
    interval: 30s
    rules:
      - alert: HighSagaFailureRate
        expr: rate(saga_total{status="failed"}[10m]) / rate(saga_total[10m]) > 0.1
        for: 10m
        labels:
          severity: high
          category: business
        annotations:
          summary: "High saga failure rate"
          description: "More than 10% of sagas are failing"
          action: "Review saga execution logs and investigate root causes"

      - alert: SagaCompensationSpike
        expr: rate(saga_compensation_total[5m]) > 5
        for: 5m
        labels:
          severity: medium
          category: business
        annotations:
          summary: "Spike in saga compensations"
          description: "More than 5 saga compensations per second"
          action: "Review saga failure patterns and improve error handling"

      - alert: LongRunningSaga
        expr: histogram_quantile(0.95, rate(saga_duration_seconds_bucket[10m])) > 60
        for: 10m
        labels:
          severity: warning
          category: business
        annotations:
          summary: "Long-running sagas detected"
          description: "95th percentile saga duration is above 60 seconds"
          action: "Review saga steps and optimize slow operations"

      - alert: WebhookProcessingFailures
        expr: rate(webhook_processed_total{status="failed"}[5m]) / rate(webhook_processed_total[5m]) > 0.1
        for: 5m
        labels:
          severity: high
          category: business
        annotations:
          summary: "High webhook processing failure rate"
          description: "More than 10% of webhooks are failing to process"
          action: "Review webhook handler logs and external service status"

  # ============================================================================
  # RATE LIMITING ALERTS
  # ============================================================================
  - name: rate_limiting
    interval: 30s
    rules:
      - alert: HighRateLimitHits
        expr: rate(rate_limit_hits_total[5m]) > 50
        for: 5m
        labels:
          severity: medium
          category: rate_limiting
        annotations:
          summary: "High rate limiting hits"
          description: "More than 50 rate limit hits per second"
          action: "Review rate limit configurations and client behavior"

      - alert: RateLimitBypass
        expr: rate(rate_limit_hits_total{tier="premium"}[5m]) > 100
        for: 5m
        labels:
          severity: high
          category: rate_limiting
        annotations:
          summary: "Potential rate limit bypass"
          description: "Premium tier rate limits being hit excessively"
          action: "Review authentication and tier assignment logic"
