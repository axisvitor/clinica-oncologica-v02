# Prometheus configuration for Hormonia quiz metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'hormonia-production'
    service: 'quiz-system'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'

# Load alerting rules
rule_files:
  - '/etc/prometheus/rules/quiz_alerts.yml'

# Scrape configurations
scrape_configs:
  # Redis exporter for quiz metrics
  - job_name: 'redis-quiz-metrics'
    scrape_interval: 10s
    static_configs:
      - targets:
          - 'redis-exporter:9121'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis-primary'

  # Application metrics (if backend exposes /metrics endpoint)
  - job_name: 'hormonia-backend'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'backend:8000'
    metric_relabel_configs:
      # Keep only quiz-related metrics
      - source_labels: [__name__]
        regex: '(quiz_.*|whatsapp_.*|webhook_.*)'
        action: keep

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - 'localhost:9090'

  # Node exporter (for system metrics)
  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'node-exporter:9100'

