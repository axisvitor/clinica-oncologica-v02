# Prometheus Recording Rules for Clínica Hormonia
# Pre-computed metrics for faster dashboard queries

groups:
  - name: application_metrics
    interval: 30s
    rules:
      # Request rates
      - record: job:app_requests:rate5m
        expr: rate(app_requests_total[5m])

      - record: job:app_requests:rate1h
        expr: rate(app_requests_total[1h])

      # Error rates
      - record: job:app_errors:rate5m
        expr: rate(app_requests_total{status=~"5.."}[5m])

      - record: job:app_error_ratio:rate5m
        expr: rate(app_requests_total{status=~"5.."}[5m]) / rate(app_requests_total[5m])

      # Latency percentiles
      - record: job:app_request_duration:p50
        expr: histogram_quantile(0.50, rate(app_request_duration_seconds_bucket[5m]))

      - record: job:app_request_duration:p95
        expr: histogram_quantile(0.95, rate(app_request_duration_seconds_bucket[5m]))

      - record: job:app_request_duration:p99
        expr: histogram_quantile(0.99, rate(app_request_duration_seconds_bucket[5m]))

  - name: database_metrics
    interval: 30s
    rules:
      - record: job:db_query_duration:p95
        expr: histogram_quantile(0.95, rate(app_db_query_duration_seconds_bucket[5m]))

      - record: job:db_connection_usage:ratio
        expr: pg_stat_database_numbackends / pg_settings_max_connections

  - name: business_metrics
    interval: 1m
    rules:
      - record: job:revenue:rate1h
        expr: rate(app_revenue_total[1h])

      - record: job:quota_usage:ratio
        expr: app_quota_usage_bytes / app_quota_limit_bytes

      - record: job:quiz_completion:rate1h
        expr: rate(app_quiz_completion_total{status="completed"}[1h])

  - name: sla_metrics
    interval: 1m
    rules:
      - record: job:uptime:24h
        expr: avg_over_time(up{job="hormonia-app"}[24h])

      - record: job:sla_compliance:24h
        expr: app_sla_compliance_ratio
