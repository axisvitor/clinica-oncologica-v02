# WebSocket Monitoring Alerts Configuration
# Prometheus AlertManager rules for WebSocket connection monitoring

groups:
  - name: websocket_alerts
    interval: 30s
    rules:
      # Critical Alerts
      - alert: WebSocketServiceDown
        expr: up{job="websocket"} == 0
        for: 2m
        labels:
          severity: critical
          component: websocket
          team: backend
        annotations:
          summary: "WebSocket service is down"
          description: "WebSocket service {{ $labels.instance }} has been down for more than 2 minutes."
          runbook: "https://docs.example.com/runbooks/websocket-down"
          dashboard: "https://grafana.example.com/d/websocket"

      - alert: WebSocketHighFailureRate
        expr: |
          (
            rate(websocket_connection_failures_total[5m]) /
            rate(websocket_connection_attempts_total[5m])
          ) > 0.5
        for: 5m
        labels:
          severity: critical
          component: websocket
          team: backend
        annotations:
          summary: "High WebSocket connection failure rate"
          description: "WebSocket connection failure rate is {{ $value | humanizePercentage }} (threshold: 50%)"
          impact: "Users cannot establish real-time connections"

      - alert: WebSocketConsecutiveFailures
        expr: websocket_consecutive_failures >= 3
        for: 1m
        labels:
          severity: critical
          component: websocket
          team: backend
        annotations:
          summary: "Multiple consecutive WebSocket failures"
          description: "WebSocket has failed {{ $value }} consecutive connection attempts"
          action: "Check server health and network connectivity"

      # Warning Alerts
      - alert: WebSocketHighLatency
        expr: histogram_quantile(0.95, websocket_connection_duration_seconds_bucket) > 3
        for: 5m
        labels:
          severity: warning
          component: websocket
          team: backend
        annotations:
          summary: "High WebSocket connection latency"
          description: "95th percentile WebSocket connection latency is {{ $value }}s (threshold: 3s)"
          dashboard: "https://grafana.example.com/d/websocket-latency"

      - alert: WebSocketManyReconnections
        expr: rate(websocket_reconnections_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          component: websocket
          team: backend
        annotations:
          summary: "High WebSocket reconnection rate"
          description: "WebSocket reconnection rate is {{ $value }} per second"
          possible_cause: "Network instability or server issues"

      - alert: WebSocketAuthenticationFailures
        expr: rate(websocket_auth_failures_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
          component: websocket
          team: security
        annotations:
          summary: "High WebSocket authentication failure rate"
          description: "WebSocket auth failures: {{ $value }} per second"
          action: "Check authentication service and review security logs"

      - alert: WebSocketMessageQueueBacklog
        expr: websocket_message_queue_size > 1000
        for: 5m
        labels:
          severity: warning
          component: websocket
          team: backend
        annotations:
          summary: "WebSocket message queue backlog"
          description: "Message queue size is {{ $value }} (threshold: 1000)"
          impact: "Messages may be delayed"

      # Performance Alerts
      - alert: WebSocketHighConnectionCount
        expr: websocket_active_connections > 5000
        for: 10m
        labels:
          severity: warning
          component: websocket
          team: backend
        annotations:
          summary: "High number of active WebSocket connections"
          description: "Active connections: {{ $value }} (threshold: 5000)"
          action: "Consider scaling WebSocket servers"

      - alert: WebSocketSlowMessageProcessing
        expr: histogram_quantile(0.95, websocket_message_processing_duration_seconds_bucket) > 1
        for: 5m
        labels:
          severity: warning
          component: websocket
          team: backend
        annotations:
          summary: "Slow WebSocket message processing"
          description: "95th percentile message processing time is {{ $value }}s"
          dashboard: "https://grafana.example.com/d/websocket-performance"

      # SSL/TLS Alerts
      - alert: WebSocketSSLCertificateExpiring
        expr: (websocket_ssl_certificate_expiry_seconds - time()) < 604800
        for: 1h
        labels:
          severity: warning
          component: websocket
          team: devops
        annotations:
          summary: "WebSocket SSL certificate expiring soon"
          description: "SSL certificate expires in {{ $value | humanizeDuration }}"
          action: "Renew SSL certificate"

      - alert: WebSocketSSLCertificateExpired
        expr: (websocket_ssl_certificate_expiry_seconds - time()) < 0
        for: 5m
        labels:
          severity: critical
          component: websocket
          team: devops
        annotations:
          summary: "WebSocket SSL certificate expired"
          description: "SSL certificate has expired"
          action: "Renew SSL certificate immediately"

      # Resource Alerts
      - alert: WebSocketHighCPUUsage
        expr: |
          rate(process_cpu_seconds_total{job="websocket"}[5m]) * 100 > 80
        for: 10m
        labels:
          severity: warning
          component: websocket
          team: backend
        annotations:
          summary: "High CPU usage on WebSocket server"
          description: "CPU usage is {{ $value }}% (threshold: 80%)"
          action: "Investigate CPU-intensive operations"

      - alert: WebSocketHighMemoryUsage
        expr: |
          (
            process_resident_memory_bytes{job="websocket"} /
            node_memory_MemTotal_bytes
          ) * 100 > 80
        for: 10m
        labels:
          severity: warning
          component: websocket
          team: backend
        annotations:
          summary: "High memory usage on WebSocket server"
          description: "Memory usage is {{ $value }}% (threshold: 80%)"
          action: "Check for memory leaks"

      # Client Alerts
      - alert: WebSocketHighClientErrorRate
        expr: |
          (
            rate(websocket_client_errors_total[5m]) /
            rate(websocket_messages_received_total[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          component: websocket
          team: frontend
        annotations:
          summary: "High WebSocket client error rate"
          description: "Client error rate is {{ $value | humanizePercentage }} (threshold: 10%)"
          action: "Check client-side WebSocket implementation"

      # Health Check Alerts
      - alert: WebSocketHealthCheckFailing
        expr: websocket_health_check_status == 0
        for: 2m
        labels:
          severity: critical
          component: websocket
          team: backend
        annotations:
          summary: "WebSocket health check failing"
          description: "Health check has been failing for 2 minutes"
          action: "Check WebSocket service status and dependencies"

# Notification routing
route:
  group_by: ['alertname', 'severity', 'component']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'

  routes:
    # Critical alerts - page immediately
    - match:
        severity: critical
      receiver: 'pagerduty'
      continue: true

    # Security alerts
    - match:
        team: security
      receiver: 'security-team'
      continue: true

    # Warning alerts - notify team
    - match:
        severity: warning
      receiver: 'slack'
      continue: true

# Receivers configuration
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/alert'
        send_resolved: true

  - name: 'pagerduty'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        severity: 'critical'
        description: '{{ .GroupLabels.alertname }}: {{ .Annotations.summary }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'

  - name: 'slack'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#websocket-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ .Annotations.description }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  - name: 'security-team'
    slack_configs:
      - api_url: '${SLACK_SECURITY_WEBHOOK_URL}'
        channel: '#security-alerts'
        title: '🔒 Security Alert: {{ .GroupLabels.alertname }}'
        text: '{{ .Annotations.description }}'
        color: 'warning'

# Inhibition rules
inhibit_rules:
  # Don't alert on high latency if service is down
  - source_match:
      alertname: 'WebSocketServiceDown'
    target_match:
      alertname: 'WebSocketHighLatency'
    equal: ['instance']

  # Don't alert on connection failures if health check is failing
  - source_match:
      alertname: 'WebSocketHealthCheckFailing'
    target_match_re:
      alertname: 'WebSocket.*Failure.*'
    equal: ['instance']
