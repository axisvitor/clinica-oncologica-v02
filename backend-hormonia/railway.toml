[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Environment variables for Railway deployment
[variables]
# Python runtime
PYTHON_VERSION = "3.11"

# App configuration
NODE_ENV = "production"
PORT = "8000"

# Database connection pooling
DB_POOL_SIZE = "20"
DB_MAX_OVERFLOW = "30"
DB_POOL_PRE_PING = "true"
DB_POOL_RECYCLE = "3600"

# Celery configuration
CELERY_WORKER_CONCURRENCY = "4"
CELERY_WORKER_MAX_TASKS_PER_CHILD = "1000"
CELERY_BEAT_ENABLED = "true"

# Gunicorn configuration
WEB_CONCURRENCY = "4"
GUNICORN_TIMEOUT = "120"
GUNICORN_KEEPALIVE = "2"
GUNICORN_MAX_REQUESTS = "1000"
GUNICORN_MAX_REQUESTS_JITTER = "50"

# Security
JWT_ALGORITHM = "HS256"
JWT_ACCESS_TOKEN_EXPIRE_MINUTES = "30"
JWT_REFRESH_TOKEN_EXPIRE_DAYS = "7"

# Monitoring and logging
LOG_LEVEL = "info"
MONITORING_ENABLED = "true"
SENTRY_DSN = ""

# Rate limiting
RATE_LIMIT_ENABLED = "true"
RATE_LIMIT_REQUESTS_PER_MINUTE = "100"

[services.web]
serviceName = "backend-web"
source = "."
buildCommand = "pip install -r requirements.txt"
startCommand = "gunicorn app.main:app -w $WEB_CONCURRENCY -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --access-logfile - --error-logfile - --log-level info --timeout 120 --keep-alive 2 --max-requests 1000 --max-requests-jitter 50 --preload --worker-tmp-dir /dev/shm"
autoDeploy = true

# Health check configuration
healthcheck = "/health"
healthcheckTimeout = 30
healthcheckInterval = 60

# Resource allocation
resources = { memory = "1024Mi", cpu = "500m" }

[services.worker]
serviceName = "backend-worker"
source = "."
buildCommand = "pip install -r requirements.txt"
startCommand = "celery -A app.celery_app worker --loglevel=info --concurrency=$CELERY_WORKER_CONCURRENCY --max-tasks-per-child=$CELERY_WORKER_MAX_TASKS_PER_CHILD --queues=celery,flows,quiz,maintenance,monitoring"
autoDeploy = true

# Resource allocation for worker
resources = { memory = "512Mi", cpu = "250m" }

[services.beat]
serviceName = "backend-beat"
source = "."
buildCommand = "pip install -r requirements.txt"
startCommand = "celery -A app.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
autoDeploy = true

# Resource allocation for beat scheduler
resources = { memory = "256Mi", cpu = "100m" }

# Cronjobs for Railway (alternative to beat if needed)
[[services.web.cron]]
schedule = "0 */6 * * *"  # Every 6 hours
command = "python -c 'from app.tasks.quiz_link_tasks import check_expired_links; check_expired_links.delay()'"

[[services.web.cron]]
schedule = "0 */2 * * *"  # Every 2 hours
command = "python -c 'from app.tasks.quiz_link_tasks import process_dead_letter_queue; process_dead_letter_queue.delay()'"

[[services.web.cron]]
schedule = "0 * * * *"   # Every hour
command = "python -c 'from app.tasks.quiz_link_tasks import monitor_resilience_metrics; monitor_resilience_metrics.delay()'"