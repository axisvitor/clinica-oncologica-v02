# =============================================================================
# RAILWAY CONFIGURATION - Backend API Service
# =============================================================================
# Service: hormonia-backend-api
# Type: FastAPI Application
# =============================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# Build context - uses entire backend-hormonia directory
# watchPatterns = ["app/**", "requirements.txt", "Dockerfile"]

[deploy]
# Health check configuration
healthcheckPath = "/health"
healthcheckTimeout = 120
startCommand = "/app/scripts/entrypoint.sh api"

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Resource configuration (adjust based on Railway plan)
numReplicas = 1

# Runtime configuration
# Railway auto-injects PORT environment variable
