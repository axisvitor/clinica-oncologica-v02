# Railway Configuration for Hormonia Backend
# FastAPI application with Gunicorn + Uvicorn workers

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Number of replicas for high availability
numReplicas = 1

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Health check configuration (matches /health endpoint)
healthcheckPath = "/health"
healthcheckTimeout = 120

# Start command (overrides Dockerfile CMD if needed)
# Using Gunicorn with Uvicorn workers for production
# Railway automatically sets PORT environment variable
# startCommand = "gunicorn app.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --access-logfile - --error-logfile - --log-level info"

[deploy.envs]
# These are documentation only - set actual values in Railway dashboard
# REQUIRED environment variables (must be set in Railway):
# - SECRET_KEY
# - JWT_SECRET_KEY
# - ENCRYPTION_KEY
# - DATABASE_URL
# - REDIS_URL
# - REDIS_PASSWORD
# - REDIS_HOST
# - REDIS_PORT
# - SUPABASE_URL
# - SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - FIREBASE_ADMIN_PROJECT_ID
# - FIREBASE_ADMIN_PRIVATE_KEY
# - FIREBASE_ADMIN_CLIENT_EMAIL
# - GEMINI_API_KEY
# - EVOLUTION_API_KEY

# Application configuration
# ENVIRONMENT = "production"
# DEBUG = "False"
# APP_NAME = "NeoplasiaLitoral-Backend"
# APP_VERSION = "2.0.0"

# Python configuration
# PYTHONUNBUFFERED = "1"
# PYTHONDONTWRITEBYTECODE = "1"
# PYTHONPATH = "/app"
# PASSLIB_BUILTIN_BCRYPT = "enabled"
