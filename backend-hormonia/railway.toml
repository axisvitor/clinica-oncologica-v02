# =============================================================================
# RAILWAY CONFIGURATION - Backend API Service (Railpack)
# =============================================================================
# Service: hormonia-backend-api
# Type: FastAPI Application
# Builder: Railpack (auto-detects Python via requirements.txt + main.py)
# =============================================================================

[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
