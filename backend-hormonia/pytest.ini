[pytest]
# Pytest configuration for Backend tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum Python version
minversion = 7.0

# Add current directory to Python path
pythonpath = .

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    --code-highlight=yes
    --durations=10
    --strict-config
    --cov=app.core.security_config
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80

# Markers for test organization
markers =
    asyncio: mark test as async (deselect with '-m "not asyncio"')
    redis: mark test as requiring Redis connection
    integration: mark test as integration test (requires external services)
    unit: mark test as unit test (no external dependencies)
    slow: mark test as slow running
    security: mark test as security-related
    performance: mark test as performance-related
    whatsapp: mark test as requiring WhatsApp service
    ai: mark test as requiring AI services
    database: mark test as requiring database
    e2e: mark test as end-to-end test
    mock: mark test as using mocks
    fixture: mark test as using fixtures

# Async test configuration
asyncio_mode = auto


# Coverage options (when using --cov)
[coverage:run]
source = app
branch = True
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */migrations/*
    */alembic/*
    */scripts/*
    app/main.py
    app/agents/*
    app/api/*
    app/services/*
    app/utils/*
    app/tasks/*
    app/repositories/*
    app/schemas/*
    app/models/*
    app/database/*
    app/config.py
    app/core/router_registry.py
    */app/agents/*
    */app/api/*
    */app/services/*
    */app/utils/*
    */app/tasks/*
    */app/repositories/*
    */app/schemas/*
    */app/models/*
    */app/database/*
    */app/config.py
    */app/core/router_registry.py
    app/**/legacy_*
    app/**/quarantined_*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

[coverage:html]
directory = htmlcov
title = Clinica Oncologica Test Coverage Report

[coverage:xml]
output = coverage.xml
