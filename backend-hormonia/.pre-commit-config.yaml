# Pre-commit hooks configuration for Backend validation automation
# Install with: pip install pre-commit && pre-commit install

repos:
  # Python code formatting and linting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: 🎨 Format Python code with Black
        args: [--line-length=88]
        files: ^Backend/.*\.py$

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: 📚 Sort Python imports with isort
        args: [--profile=black, --line-length=88]
        files: ^Backend/.*\.py$

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: 🔍 Lint Python code with Flake8
        args: [--max-line-length=88, --extend-ignore=E203,W503]
        files: ^Backend/.*\.py$

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        name: 🔐 Security scan with Bandit
        args: [-r, Backend/app/, -ll, --skip=B101,B601]
        files: ^Backend/app/.*\.py$

  # Python dependency security
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.2
    hooks:
      - id: python-safety-dependencies-check
        name: 🛡️ Check Python dependencies for vulnerabilities
        files: ^Backend/requirements\.txt$

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: ✂️ Trim trailing whitespace
        files: ^Backend/.*\.(py|js|ts|json|yaml|yml|md)$

      - id: end-of-file-fixer
        name: 📝 Fix end of files
        files: ^Backend/.*\.(py|js|ts|json|yaml|yml|md)$

      - id: check-yaml
        name: 📋 Check YAML syntax
        files: ^Backend/.*\.ya?ml$

      - id: check-json
        name: 🔧 Check JSON syntax
        files: ^Backend/.*\.json$

      - id: check-added-large-files
        name: 📦 Check for large files
        args: [--maxkb=500]

      - id: check-merge-conflict
        name: 🔀 Check for merge conflict markers

      - id: debug-statements
        name: 🐛 Check for debug statements
        files: ^Backend/.*\.py$

  # Type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        name: 🔍 Type check with MyPy
        additional_dependencies: [types-requests, types-redis, types-PyYAML]
        args: [--ignore-missing-imports, --install-types, --non-interactive]
        files: ^Backend/app/.*\.py$

  # Custom validation hooks
  - repo: local
    hooks:
      # AI Humanization validation
      - id: ai-humanization-check
        name: 🤖 AI Humanization Validation
        entry: python3 Backend/scripts/validate_ai_humanization.py
        language: system
        files: ^Backend/app/(services|utils|models)/.*\.py$
        pass_filenames: false

      # Quiz humanization protection
      - id: quiz-humanization-check
        name: 📝 Quiz Humanization Protection
        entry: python3 Backend/scripts/validate_quiz_humanization.py
        language: system
        files: ^Backend/app/services/(flow_engine|quiz).*\.py$
        pass_filenames: false

      # Thread safety validation
      - id: thread-safety-check
        name: 🔒 Thread Safety Validation
        entry: python3 Backend/scripts/test_thread_safety.py
        language: system
        files: ^Backend/app/(core|services|dependencies)/.*\.py$
        pass_filenames: false

      # Import validation
      - id: import-validation
        name: 📦 Import Structure Validation
        entry: python3 Backend/scripts/verify_imports_fixed.py
        language: system
        files: ^Backend/app/.*\.py$
        pass_filenames: false

      # Redis client import check
      - id: check-redis-imports
        name: 🔴 Check for deprecated Redis imports
        entry: python scripts/check_redis_imports.py
        language: python
        files: ^app/.*\.py$
        pass_filenames: false
        stages: [commit]

      # Critical bug pattern validation
      - id: critical-pattern-validation
        name: 🚨 Critical Bug Pattern Validation
        entry: py scripts/validate_critical_patterns.py
        language: system
        files: ^app/.*\.py$
        pass_filenames: false
        stages: [commit]

      # Dependency injection validation
      - id: dependency-injection-check
        name: 📦 Dependency Injection Pattern Check
        entry: py scripts/validate_dependency_injection.py
        language: system
        files: ^app/(dependencies|api)/.*\.py$
        pass_filenames: false
        stages: [commit]

      # Role enum validation
      - id: role-enum-validation
        name: 👤 Role Enum Usage Validation
        entry: py scripts/validate_role_enums.py
        language: system
        files: ^app/.*\.py$
        pass_filenames: false
        stages: [commit]

      # Database model compatibility check
      - id: database-model-validation
        name: 🗄️ Database Model Compatibility Check
        entry: py scripts/validate_db_models.py
        language: system
        files: ^app/models/.*\.py$
        pass_filenames: false
        stages: [commit]

      # Date parameter validation
      - id: date-parameter-validation
        name: 📅 Date Parameter Handling Validation
        entry: py scripts/validate_date_parameters.py
        language: system
        files: ^app/api/.*\.py$
        pass_filenames: false
        stages: [commit]

      # Configuration validation
      - id: config-validation
        name: ⚙️ Configuration Validation
        entry: bash -c 'cd Backend && python3 -c "from app.config import get_settings; settings = get_settings(); print(\"✅ Configuration valid\")"'
        language: system
        files: ^Backend/app/config\.py$
        pass_filenames: false

      # Database model validation
      - id: database-model-check
        name: 🗄️ Database Model Validation
        entry: bash -c 'cd Backend && python3 -c "from app.models import *; print(\"✅ Database models valid\")"'
        language: system
        files: ^Backend/app/models/.*\.py$
        pass_filenames: false

      # API endpoint validation
      - id: api-endpoint-check
        name: 🌐 API Endpoint Validation
        entry: bash -c 'cd Backend && python3 -c "from app.main import app; from fastapi.openapi.utils import get_openapi; get_openapi(title=\"API\", version=\"1.0.0\", routes=app.routes); print(\"✅ API endpoints valid\")"'
        language: system
        files: ^Backend/app/api/.*\.py$
        pass_filenames: false

      # Secrets detection
      - id: secrets-detection
        name: 🔑 Secrets Detection
        entry: bash -c 'if grep -r -E "(password|secret|key|token)\s*[=:]\s*['\''\"'][^'\''\"]{8,}['\''\"']" Backend/app/ --exclude-dir=__pycache__ --exclude="*.pyc"; then echo "❌ Potential secrets found in code"; exit 1; else echo "✅ No hardcoded secrets detected"; fi'
        language: system
        files: ^Backend/app/.*\.py$
        pass_filenames: false

      # Performance validation (lightweight check)
      - id: performance-check
        name: ⚡ Basic Performance Check
        entry: bash -c 'cd Backend && timeout 30s python3 scripts/performance_benchmark.py --quick-check || echo "⚠️ Performance check skipped (timeout or error)"'
        language: system
        files: ^Backend/app/services/.*\.py$
        pass_filenames: false

      # Memory leak detection (quick check)
      - id: memory-check
        name: 🧠 Memory Usage Check
        entry: bash -c 'cd Backend && python3 -c "
import psutil
import os
process = psutil.Process(os.getpid())
memory_mb = process.memory_info().rss / 1024 / 1024
if memory_mb > 100:
    print(f\"⚠️ High memory usage: {memory_mb:.1f}MB\")
else:
    print(f\"✅ Memory usage normal: {memory_mb:.1f}MB\")
"'
        language: system
        files: ^Backend/app/.*\.py$
        pass_filenames: false

      # Test coverage check
      - id: test-coverage-check
        name: 🧪 Test Coverage Check
        entry: bash -c 'cd Backend && if [ -d "tests" ]; then python3 -m pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=70 -q || echo "⚠️ Test coverage below 70%"; else echo "⚠️ No tests directory found"; fi'
        language: system
        files: ^Backend/(app|tests)/.*\.py$
        pass_filenames: false

  # JavaScript/Node.js checks (if applicable)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        name: 🔍 Lint JavaScript/TypeScript with ESLint
        files: ^Backend/.*\.(js|ts)$
        additional_dependencies:
          - eslint@8.56.0
          - '@typescript-eslint/parser@6.21.0'
          - '@typescript-eslint/eslint-plugin@6.21.0'

  # Additional validation for specific files
  - repo: local
    hooks:
      # Docker security check
      - id: docker-security-check
        name: 🐳 Docker Security Check
        entry: bash -c 'if [ -f "Backend/Dockerfile" ]; then if grep -q "USER.*[0-9]" Backend/Dockerfile; then echo "✅ Docker uses non-root user"; else echo "⚠️ Docker should use non-root user"; fi; fi'
        language: system
        files: ^Backend/Dockerfile.*$
        pass_filenames: false

      # Environment file validation
      - id: env-file-check
        name: 🌍 Environment File Check
        entry: bash -c 'if [ -f "Backend/.env.example" ]; then echo "✅ Environment example file exists"; else echo "❌ .env.example file missing"; exit 1; fi'
        language: system
        files: ^Backend/\.env.*$
        pass_filenames: false

      # Requirements security check
      - id: requirements-security
        name: 📋 Requirements Security Check
        entry: bash -c 'cd Backend && if command -v safety >/dev/null; then safety check -r requirements.txt || echo "⚠️ Security vulnerabilities in dependencies"; else echo "⚠️ Safety not installed"; fi'
        language: system
        files: ^Backend/requirements\.txt$
        pass_filenames: false

# Configuration for specific tools
default_language_version:
  python: python3

# Global settings
default_stages: [commit, push]
fail_fast: false
minimum_pre_commit_version: '2.20.0'

# CI settings (can be overridden)
ci:
  autofix_prs: true
  autofix_commit_msg: 'style: auto-fix pre-commit hooks [skip ci]'
  autoupdate_schedule: 'weekly'
  autoupdate_commit_msg: 'chore: pre-commit autoupdate [skip ci]'