# =============================================================================
# RAILWAY CONFIGURATION - Celery Worker Service (Railpack)
# =============================================================================
# Service: hormonia-celery-worker
# Type: Celery Worker (Background Task Processing)
# Builder: Railpack (uses same Python environment as API)
# =============================================================================

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "celery -A app.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1
