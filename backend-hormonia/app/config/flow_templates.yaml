# Centralized Flow Template Configuration
# This file defines unified template mappings for all conversation flows

# Treatment type to flow template mapping
# Maps patient treatment_type keywords to flow template identifiers
treatment_type_mapping:
  # Hormone therapy keywords
  hormone:
    keywords: ["hormone", "hormonal", "hormone_therapy", "hormonioterapia"]
    template: "hormone_therapy_1"
    priority: 10

  # Chemotherapy keywords
  chemotherapy:
    keywords: ["chemotherapy", "quimio", "quimioterapia", "chemo"]
    template: "chemotherapy_cycle_1"
    priority: 10

  # Initial onboarding keywords
  initial:
    keywords: ["initial", "onboarding", "new_patient"]
    template: "day_1_15"
    priority: 5

  # Monthly follow-up keywords
  monthly:
    keywords: ["monthly", "followup", "follow_up", "maintenance"]
    template: "day_16_45"
    priority: 5

# Default template when no match is found
default_treatment_template: "day_1_15"

# Flow type mappings and configurations
flow_types:
  # Default daily check-in flow
  daily_checkin:
    name: "Daily Check-in"
    description: "Standard daily patient check-in flow"
    duration_days: 1
    frequency: "daily"
    priority: "normal"
    tags: ["checkin", "daily", "standard"]

    timing:
      start_hour: 9
      end_hour: 16
      timezone: "America/Sao_Paulo"
      respect_patient_preferences: true

    personalization:
      ai_optimization: true
      sentiment_analysis: true
      comprehensive_assessment: true
      risk_evaluation: true

  # Quiz-specific flows
  quiz_monthly:
    name: "Monthly Quiz Assessment"
    description: "Monthly structured quiz for patient assessment"
    duration_days: 1
    frequency: "monthly"
    priority: "high"
    tags: ["quiz", "assessment", "structured"]

    template_mapping:
      file_path: "templates/quiz/monthly_quiz.yaml"
      fallback_template: "basic_quiz"
      version: "1.3.0"

    timing:
      start_hour: 9
      end_hour: 20
      timezone: "America/Sao_Paulo"
      flexible_timing: true

    personalization:
      ai_optimization: false  # Structured quiz, less AI variation
      sentiment_analysis: true
      adaptive_questions: true

  # Emergency/urgent flows
  urgent_followup:
    name: "Urgent Follow-up"
    description: "Immediate follow-up for concerning symptoms or responses"
    duration_days: 1
    frequency: "immediate"
    priority: "urgent"
    tags: ["urgent", "immediate", "clinical"]

    template_mapping:
      file_path: "templates/flows/urgent_followup.yaml"
      fallback_template: "urgent_basic"
      version: "1.0.0"

    timing:
      start_hour: 8
      end_hour: 22
      timezone: "America/Sao_Paulo"
      immediate_delivery: true

    personalization:
      ai_optimization: false  # Keep urgent messages standardized
      sentiment_analysis: true
      clinical_escalation: true

# Template directory structure
template_directories:
  base_path: "templates"
  flows: "templates/flows"
  quiz: "templates/quiz"
  fallbacks: "templates/fallbacks"
  ai_prompts: "templates/ai"

# Default configurations
defaults:
  # Default timing settings
  timing:
    timezone: "America/Sao_Paulo"
    business_hours_start: 9
    business_hours_end: 18
    weekend_delivery: false
    holiday_delivery: false

  # Default personalization
  personalization:
    ai_optimization: true
    sentiment_analysis: true
    demographic_targeting: false
    language_adaptation: true

  # Default caching
  caching:
    template_cache_ttl: 3600  # 1 hour
    flow_state_cache_ttl: 1800  # 30 minutes
    patient_cache_ttl: 7200  # 2 hours

  # Default retry behavior
  retry:
    max_attempts: 3
    backoff_multiplier: 2
    initial_delay: 60  # seconds

# Flow transition rules
transitions:
  # Automatic progression rules
  auto_progression:
    day_1_15_to_day_16_45:
      condition: "current_day >= 16"
      automatic: true
      validation_required: false

    day_16_45_to_monthly:
      condition: "current_day >= 46"
      automatic: true
      validation_required: true

    # Emergency transitions
    any_to_urgent:
      triggers:
        - "high_risk_response"
        - "concerning_symptoms"
        - "no_response_48h"
      automatic: true
      priority_override: true

  # Manual transition support
  manual_transitions:
    doctor_override: true
    patient_request: true
    clinical_decision: true

# Integration settings
integrations:
  # WhatsApp integration
  whatsapp:
    rate_limiting:
      messages_per_minute: 10
      burst_allowance: 5

    message_formatting:
      use_rich_text: true
      emoji_support: true
      interactive_buttons: true

  # AI service integration
  ai_services:
    openai:
      model: "gpt-4"
      temperature: 0.7
      max_tokens: 1000

    gemini:
      model: "gemini-pro"
      safety_settings: "high"

    sentiment_analysis:
      provider: "gemini"
      confidence_threshold: 0.8

# Monitoring and analytics
monitoring:
  # Flow performance metrics
  metrics:
    track_delivery_rates: true
    track_response_rates: true
    track_completion_rates: true
    track_sentiment_trends: true

  # Alert conditions
  alerts:
    low_engagement_threshold: 0.3  # 30% response rate
    high_risk_sentiment_threshold: -0.7
    template_error_rate_threshold: 0.05  # 5% error rate

  # Reporting
  reporting:
    daily_summary: true
    weekly_analysis: true
    monthly_comprehensive: true

# Security and compliance
security:
  # Data protection
  data_protection:
    encrypt_sensitive_fields: true
    anonymize_logs: true
    gdpr_compliance: true

  # Access control
  access_control:
    role_based_access: true
    audit_trail: true
    session_management: true

# Feature flags
feature_flags:
  ai_optimization: true
  advanced_personalization: true
  real_time_analytics: true
  multi_language_support: false  # Future feature
  voice_messages: false  # Future feature
  video_calls: false  # Future feature