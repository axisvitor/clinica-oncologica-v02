version: "3.8"

services:
  dragonfly:
    image: ${DRAGONFLY_IMAGE:-docker.dragonflydb.io/dragonflydb/dragonfly:latest}
    container_name: dragonfly
    ports:
      - "6379:6379"
    ulimits:
      memlock: -1
    volumes:
      - dragonfly-data:/data
    command: dragonfly --logtostderr --num_dbs 16
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      REDIS_URL: redis://dragonfly:6379/0
      REDIS_HOST: dragonfly
      REDIS_PORT: 6379
      RATE_LIMIT_REDIS_URL: redis://dragonfly:6379/3
      CELERY_BROKER_URL: redis://dragonfly:6379/0
      CELERY_RESULT_BACKEND: redis://dragonfly:6379/1
    depends_on:
      dragonfly:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: taskiq worker app.taskiq_broker:broker
    env_file: .env
    environment:
      REDIS_URL: redis://dragonfly:6379/0
      REDIS_HOST: dragonfly
      REDIS_PORT: 6379
      RATE_LIMIT_REDIS_URL: redis://dragonfly:6379/3
      CELERY_BROKER_URL: redis://dragonfly:6379/0
    depends_on:
      dragonfly:
        condition: service_healthy

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: taskiq scheduler app.taskiq_broker:scheduler
    env_file: .env
    environment:
      REDIS_URL: redis://dragonfly:6379/0
      REDIS_HOST: dragonfly
      REDIS_PORT: 6379
      RATE_LIMIT_REDIS_URL: redis://dragonfly:6379/3
      CELERY_BROKER_URL: redis://dragonfly:6379/0
    depends_on:
      dragonfly:
        condition: service_healthy

  wuzapi:
    image: asternic/wuzapi:latest
    container_name: wuzapi_hormonia
    ports:
      - "${WUZAPI_PORT:-8081}:8080"
    environment:
      WUZAPI_ADMIN_TOKEN: ${WUZAPI_ADMIN_TOKEN}
      WUZAPI_GLOBAL_ENCRYPTION_KEY: ${WUZAPI_GLOBAL_ENCRYPTION_KEY:-}
      WUZAPI_GLOBAL_HMAC_KEY: ${WUZAPI_GLOBAL_HMAC_KEY:-}
      TZ: America/Sao_Paulo
      WEBHOOK_FORMAT: json
    volumes:
      - wuzapi-data:/app/dbdata
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  dragonfly-data:
  wuzapi-data:
