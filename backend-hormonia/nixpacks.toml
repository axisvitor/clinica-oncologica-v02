# Nixpacks configuration for Railway deployment
# Optimized for Python FastAPI applications

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
PIP_NO_CACHE_DIR = "1"
PIP_DISABLE_PIP_VERSION_CHECK = "1"

[phases.setup]
nixPkgs = ["python311", "gcc", "pkg-config", "libffi", "postgresql"]
nixLibs = ["libffi", "libssl"]

[phases.install]
cmds = [
    "python -m pip install --upgrade pip setuptools wheel",
    "pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
cmds = [
    "python -m compileall app/",
    "python -c 'import app.main; print(\"App validation successful\")'",
]

[start]
cmd = "gunicorn app.main:app -w ${WEB_CONCURRENCY:-4} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:${PORT:-8000} --access-logfile - --error-logfile - --log-level info --timeout 120 --keep-alive 2 --max-requests 1000 --max-requests-jitter 50 --preload --worker-tmp-dir /dev/shm"