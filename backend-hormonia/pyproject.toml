[tool.black]
line-length = 120
target-version = ['py313']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
  | \.venv
  | venv
  | migrations
  | alembic
  | __pycache__
)/
'''

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip_glob = ["*/migrations/*", "*/alembic/*", "*/.venv/*", "*/venv/*"]

[tool.bandit]
exclude_dirs = ["/tests", "/migrations", "/alembic", "/scripts"]
skips = ["B101", "B601"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers"
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
norecursedirs = [".git", ".tox", "dist", "build", "*.egg", "__pycache__", ".venv", "venv"]
filterwarnings = ["ignore::DeprecationWarning", "ignore::PendingDeprecationWarning"]
markers = [
    "api: API integration tests",
    "unit: Unit tests",
    "slow: Slow running tests",
    "integration: Integration tests",
    "asyncio: Asyncio tests",
    "auth: Authentication tests",
    "crud: CRUD tests",
    "quiz: Quiz tests",
    "patient: Patient tests",
    "patients: Patients tests",
    "routes: Route validation tests",
    "security: Security tests",
    "critical: Critical tests",
    "p0: P0 priority tests",
    "performance: Performance tests",
    "timeout: Timeout-related tests",
    "lgpd: LGPD compliance tests",
    "idempotency: Idempotency tests",
    "saga: Saga orchestration tests",
    "encryption: Encryption tests",
    "adk_smoke: ADK smoke tests for critical oncology trajectories",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "*/tests/*",
    "*/migrations/*",
    "*/alembic/*",
    "*/__pycache__/*",
    "*/venv/*",
    "*/.venv/*"
]

[tool.coverage.report]
precision = 2
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod"
]

[tool.radon]
exclude = "*/migrations/*,*/alembic/*,*/tests/*,*/venv/*"

[tool.ruff]
line-length = 120
target-version = "py313"
exclude = [
    ".git",
    ".venv",
    "venv",
    "migrations",
    "alembic",
    "__pycache__",
]

[tool.ruff.lint]
# Select F (pyflakes) rules only - E rules are handled by black/other formatters
select = ["F"]
ignore = []

[tool.ruff.lint.per-file-ignores]
# __init__.py files may have late imports for re-exports
"**/__init__.py" = ["F401"]
