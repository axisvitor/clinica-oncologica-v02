[pytest]
# Pytest configuration for LGPD and Idempotency tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    unit: marks tests as unit tests
    lgpd: marks tests related to LGPD compliance
    idempotency: marks tests for idempotency features
    saga: marks tests for saga orchestration
    encryption: marks tests for encryption
    slow: marks tests as slow

# Test output
console_output_style = progress
verbosity = 2

# Coverage
addopts =
    --strict-markers
    --strict-config
    -ra
    --showlocals

# Ignore paths
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .venv
    venv

# Minimum Python version
minversion = 3.9

# Test timeouts (requires pytest-timeout)
timeout = 300

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Test paths
testpaths = tests

# Doctest configuration
doctest_optionflags =
    NORMALIZE_WHITESPACE
    ELLIPSIS

# Environment variables
env =
    ENCRYPTION_KEY=test_key_32_characters_exactly!
    ENVIRONMENT=test
    TESTING=1
