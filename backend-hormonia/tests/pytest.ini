[pytest]
# Pytest configuration for LGPD and Idempotency tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    unit: marks tests as unit tests
    lgpd: marks tests related to LGPD compliance
    idempotency: marks tests for idempotency features
    saga: marks tests for saga orchestration
    encryption: marks tests for encryption
    slow: marks tests as slow

# Coverage
addopts = -ra

# Ignore paths
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .venv
    venv

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test paths
testpaths = tests
