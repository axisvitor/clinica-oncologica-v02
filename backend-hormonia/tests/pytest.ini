[pytest]
# Pytest configuration for LGPD and Idempotency tests

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    unit: marks tests as unit tests
    api: marks tests as api tests
    auth: marks tests as authentication tests
    crud: marks tests as CRUD tests
    quiz: marks tests as quiz tests
    patient: marks tests as patient tests
    lgpd: marks tests related to LGPD compliance
    idempotency: marks tests for idempotency features
    saga: marks tests for saga orchestration
    encryption: marks tests for encryption
    slow: marks tests as slow
    security: marks tests as security tests
    critical: marks tests as critical
    p0: marks tests as p0
    performance: marks tests as performance
    timeout: marks tests as timeout

# Coverage
addopts = -ra

# Ignore paths
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .venv
    venv

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test paths
testpaths = tests
