[tool:pytest]
# Pytest configuration for authentication service tests

# Test discovery
testpaths =
    tests/unit/services
    tests/integration

# Test pattern matching
python_files =
    test_*auth*.py
    test_*firebase*.py
    test_*audit*.py

python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    auth: Authentication related tests
    firebase: Firebase authentication tests
    audit: Audit logging tests
    slow: Slow running tests
    redis: Tests requiring Redis
    database: Tests requiring database

# Coverage settings
addopts =
    --strict-markers
    --strict-config
    --verbose
    -ra
    --cov=app.services.firebase_auth_service
    --cov=app.services.auth
    --cov=app.services.audit_service
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=80
    --tb=short

# Logging
log_level = INFO
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Timeout for long-running tests
timeout = 300

# Test isolation
addopts =
    --forked
    --disable-warnings

# Minimum version requirements
minversion = 6.0