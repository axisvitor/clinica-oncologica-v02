[tool:pytest]
# Pytest configuration for audit service tests

# Test discovery
testpaths = tests/unit/services
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage configuration
addopts =
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --cov=app.services.audit_service
    --cov=app.services.audit_log
    --cov-report=term-missing
    --cov-report=html:htmlcov_audit_services
    --cov-fail-under=85

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    security: Security-related tests
    performance: Performance tests
    lgpd: LGPD compliance tests
    hipaa: HIPAA compliance tests
    ai_audit: AI-specific audit tests

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:passlib.*

# Test timeout
timeout = 120

# Minimum coverage thresholds
# These can be adjusted based on actual coverage results
[coverage:run]
source = app.services.audit_service, app.services.audit_log
omit =
    */tests/*
    */venv/*
    */env/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov_audit_services
title = Audit Services Coverage Report