version: '3.8'

services:
  # PostgreSQL Database with connection pooling
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-hormonia}
      POSTGRES_USER: ${DATABASE_USER:-hormonia_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secure_password_123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c max_worker_processes=8
      -c max_parallel_workers_per_gather=4
      -c max_parallel_workers=8
      -c max_parallel_maintenance_workers=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-hormonia_user} -d ${DATABASE_NAME:-hormonia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hormonia_network

  # Redis with persistence and clustering support
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
      --tcp-backlog 511
      --databases 16
      --save 900 1
      --save 300 10
      --save 60 10000
      --stop-writes-on-bgsave-error yes
      --rdbcompression yes
      --rdbchecksum yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - hormonia_network

  # Thread-safe FastAPI application with multiple workers
  app:
    build:
      context: .
      dockerfile: Dockerfile.thread-safe
    environment:
      # Database configuration
      DATABASE_URL: postgresql://${DATABASE_USER:-hormonia_user}:${DATABASE_PASSWORD:-secure_password_123}@postgres:5432/${DATABASE_NAME:-hormonia}

      # Redis configuration
      REDIS_URL: redis://redis:6379/0

      # Application configuration
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-in-production}
      DEBUG: "false"
      ENVIRONMENT: "production"

      # CORS configuration
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["https://yourdomain.com", "https://www.yourdomain.com"]}

      # Thread safety configuration
      WORKERS: ${WORKERS:-4}
      MAX_CONNECTIONS_PER_WORKER: ${MAX_CONNECTIONS_PER_WORKER:-25}
      POOL_SIZE: ${POOL_SIZE:-10}
      POOL_MAX_OVERFLOW: ${POOL_MAX_OVERFLOW:-20}

      # Monitoring
      ENABLE_MONITORING: "true"
      LOG_LEVEL: "INFO"

      # External services
      WHATSAPP_API_URL: ${WHATSAPP_API_URL}
      WHATSAPP_API_KEY: ${WHATSAPP_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}

      # Security
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt-secret-key-change-in-production}
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    ports:
      - "${APP_PORT:-8000}:8000"

    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/thread-safety"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    restart: unless-stopped
    networks:
      - hormonia_network

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.8'
        reservations:
          memory: 512M
          cpus: '0.4'

  # Nginx reverse proxy with load balancing
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/thread-safe.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
      - ./ssl:/etc/nginx/ssl:ro  # SSL certificates directory
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - hormonia_network

  # Redis monitoring (optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: ${REDIS_ADMIN_USER:-admin}
      HTTP_PASSWORD: ${REDIS_ADMIN_PASSWORD:-admin123}
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - hormonia_network
    profiles:
      - monitoring

  # PostgreSQL monitoring (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hormonia.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-8082}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - hormonia_network
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  nginx_logs:
    driver: local
  pgadmin_data:
    driver: local

networks:
  hormonia_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16