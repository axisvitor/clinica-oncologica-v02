# =============================================================================
# RAILWAY CONFIGURATION - Quiz Mensal Interface (Next.js 14 + Railpack)
# =============================================================================
# Service: Monthly quiz interface for patients
# Technology: Next.js 14 with standalone output
# Builder: Railpack (auto-detects Next.js)
# =============================================================================

[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
