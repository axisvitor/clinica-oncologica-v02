steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-t',
      'us-central1-docker.pkg.dev/woven-framework-484323-n7/clinica-repo/quiz-interface:${_IMAGE_TAG}',
      '--build-arg',
      'NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}',
      '--build-arg',
      'NEXT_PUBLIC_QUIZ_PUBLIC_API_URL=${_NEXT_PUBLIC_QUIZ_PUBLIC_API_URL}',
      '.',
    ]
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/woven-framework-484323-n7/clinica-repo/quiz-interface:${_IMAGE_TAG}']
substitutions:
  _IMAGE_TAG: 'latest'
  _NEXT_PUBLIC_API_URL: 'https://clinica-api-217549452180.us-central1.run.app/api/v2'
  _NEXT_PUBLIC_QUIZ_PUBLIC_API_URL: 'https://clinica-api-217549452180.us-central1.run.app/api/v2/quiz-extensions'
options:
  machineType: 'E2_HIGHCPU_8'
