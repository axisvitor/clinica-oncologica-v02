
[build]
builder = "nixpacks"
buildCommand = "npm run build:runtime"

[deploy]
startCommand = "npm run preview"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "never"

[[services]]
name = "frontend"

[services.variables]
# These will be provided by Railway at runtime
NODE_ENV = "production"
PORT = "3000"

# NOTE: The following variables should be set in Railway dashboard
# TOML does not support process.env syntax - these are placeholders
# Set these in Railway UI under "Variables" tab:

# VITE_SUPABASE_URL = "https://your-project.supabase.co"
# VITE_SUPABASE_ANON_KEY = "your-anon-key"
# VITE_API_URL = "https://backend.railway.app/api/v1"
# VITE_API_BASE_URL = "https://backend.railway.app"
# VITE_WS_BASE_URL = "wss://backend.railway.app/ws"

# Application Configuration
VITE_WHATSAPP_INSTANCE_NAME = "hormonia-instance"
VITE_ENVIRONMENT = "production"
VITE_DEBUG_MODE = "false"
