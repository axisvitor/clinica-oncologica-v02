
[build]
builder = "DOCKERFILE"
# IMPORTANTE: Configure Root Directory no Railway Dashboard
# Settings → Root Directory → frontend-hormonia
# Railway detectará automaticamente o Dockerfile

[deploy]
startCommand = "/docker-entrypoint.sh"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"

[[services]]
name = "frontend"

# Environment variables should be set in Railway dashboard
# This file only defines the service configuration
