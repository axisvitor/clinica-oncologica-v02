# =============================================================================
# RAILWAY CONFIGURATION - Frontend Hormonia (React/Vite + Railpack)
# =============================================================================
# Service: Main frontend application (Admin Dashboard)
# Technology: React 19 + Vite
# Builder: Railpack (auto-detects Vite, serves static files from dist/)
# =============================================================================

[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
