# Optimized Nginx Configuration for Railway Production
# Performance Score Target: 90/100
# Designed for: Multi-core containers, high concurrency, low latency

user nginx;
worker_processes auto;  # Auto-detect CPU cores (Railway: 1-4)
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;  # 16,384+ total with 4 workers
    multi_accept on;
    use epoll;  # Linux-specific optimization
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ============================================
    # PERFORMANCE OPTIMIZATIONS
    # ============================================

    # Kernel-level zero-copy for static files
    sendfile on;
    tcp_nopush on;  # Send headers in one packet
    tcp_nodelay on;  # Don't buffer small packets

    # File descriptor caching
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Async file I/O for large files
    aio threads;
    directio 1m;  # Use direct I/O for files > 1MB

    # Connection management
    keepalive_timeout 30s;
    keepalive_requests 1000;
    reset_timedout_connection on;

    # Buffer sizes
    client_body_buffer_size 128k;
    client_max_body_size 10m;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    output_buffers 2 32k;
    postpone_output 1460;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_disable "msie6";
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml
        application/x-font-ttf
        application/vnd.ms-fontobject
        font/opentype
        font/woff
        font/woff2;

    # Proxy cache for API responses
    proxy_cache_path /var/cache/nginx/api
        levels=1:2
        keys_zone=api_cache:10m
        max_size=100m
        inactive=60m
        use_temp_path=off;

    # Backend upstream with keepalive
    # IMPORTANT: envsubst will replace ${BACKEND_HOST} and ${BACKEND_PORT}
    # Defaults are set in docker-entrypoint.sh BEFORE envsubst runs
    upstream backend {
        server ${BACKEND_HOST}:${BACKEND_PORT};
        keepalive 32;
        keepalive_timeout 60s;
    }

    # Connection upgrade header mapping
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # ============================================
    # SERVER BLOCK
    # ============================================

    server {
        listen 3000;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Static assets with aggressive caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;

            # Enable ETag for validation
            etag on;

            # Disable access log for static assets
            access_log off;
        }

        # HTML files - no cache for SPA
        location ~* \.(html)$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            etag on;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Runtime config endpoint (serve locally)
        location = /api/config {
            access_log off;
            default_type application/json;
            add_header Cache-Control "no-store" always;
            try_files /api/config /api/config.json =404;
        }

        # API proxy with optimized settings
        location /api/ {
            # Proxy to backend upstream
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # Enable SNI for HTTPS upstream
            proxy_ssl_server_name on;
            proxy_ssl_name $proxy_host;

            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Keepalive to backend
            proxy_set_header Connection "";

            # Timeouts (optimized for Railway)
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Disable buffering for real-time
            proxy_buffering off;
            proxy_request_buffering off;

            # Optional: Cache GET requests (uncomment to enable)
            # proxy_cache api_cache;
            # proxy_cache_valid 200 5m;
            # proxy_cache_valid 404 1m;
            # proxy_cache_methods GET HEAD;
            # proxy_cache_key "$scheme$request_method$host$request_uri";
            # proxy_cache_bypass $http_authorization;
            # proxy_no_cache $http_authorization;
            # add_header X-Cache-Status $upstream_cache_status;
        }

        # WebSocket for real-time features
        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_ssl_server_name on;
            proxy_ssl_name $proxy_host;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket-specific timeouts
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;

            # No buffering for WebSocket
            proxy_buffering off;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Error pages
        error_page 404 /index.html;
        error_page 500 502 503 504 /index.html;
    }
}
