<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Hormonia</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 40px;
            background-color: #f5f5f5;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #2563eb; }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 4px;
            background: #f0f0f0;
        }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #1d4ed8; }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏥 Hormonia - Teste de Conectividade</h1>

        <div class="status info">
            <strong>Status:</strong> Esta página HTML estática está funcionando!
        </div>

        <h2>Teste de APIs</h2>
        <div id="api-status">Verificando...</div>

        <h2>Informações do Ambiente</h2>
        <pre id="env-info">Carregando...</pre>

        <h2>Ações</h2>
        <button onclick="testBackend()">Testar Backend</button>
        <button onclick="testSupabase()">Testar Supabase</button>
        <button onclick="location.reload()">Recarregar</button>

        <h2>Logs</h2>
        <div id="logs" style="background: #f8f8f8; padding: 10px; border-radius: 4px; min-height: 100px; font-family: monospace; font-size: 12px;">
            Aguardando ações...
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://backend-production-e0bd.up.railway.app';
        const SUPABASE_URL = 'https://rszpypytdciggybbpnrp.supabase.co';

        function log(message, type = 'info') {
            const logsDiv = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'red' : type === 'success' ? 'green' : '#666';
            logsDiv.innerHTML += `<div style="color: ${color}">[${time}] ${message}</div>`;
        }

        async function testBackend() {
            log('Testando Backend...');
            try {
                const response = await fetch(`${BACKEND_URL}/api/v1/health`);
                const data = await response.json();
                log(`Backend OK: ${JSON.stringify(data)}`, 'success');
                updateStatus('Backend funcionando!', 'success');
            } catch (error) {
                log(`Erro no Backend: ${error.message}`, 'error');
                updateStatus(`Backend erro: ${error.message}`, 'error');
            }
        }

        async function testSupabase() {
            log('Testando Supabase...');
            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/health`);
                if (response.ok || response.status === 404) {
                    log('Supabase respondeu', 'success');
                    updateStatus('Supabase acessível', 'success');
                } else {
                    log(`Supabase status: ${response.status}`, 'error');
                }
            } catch (error) {
                log(`Erro Supabase (CORS esperado): ${error.message}`, 'info');
                updateStatus('Supabase: CORS bloqueia teste direto (normal)', 'info');
            }
        }

        function updateStatus(message, type) {
            const statusDiv = document.getElementById('api-status');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }

        // Mostrar informações do ambiente
        document.getElementById('env-info').textContent = `
URL: ${window.location.href}
Host: ${window.location.host}
Protocol: ${window.location.protocol}
UserAgent: ${navigator.userAgent.substring(0, 100)}...
Backend: ${BACKEND_URL}
Supabase: ${SUPABASE_URL}
        `;

        // Teste automático ao carregar
        window.onload = async () => {
            log('Página carregada, iniciando testes...');
            await testBackend();
        };
    </script>
</body>
</html>
