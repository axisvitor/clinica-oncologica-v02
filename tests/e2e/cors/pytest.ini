[pytest]
# Pytest configuration for CORS E2E tests

testpaths = .

python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    cors: CORS-related tests
    preflight: Preflight-specific tests
    security: Security-related tests
    smoke: Smoke tests for quick validation
    slow: Slow-running tests

# Asyncio configuration
asyncio_mode = auto

# Output settings
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -p no:warnings

# Test discovery patterns
norecursedirs = .git .tox dist build *.egg __pycache__ node_modules

# Coverage settings (optional)
# Uncomment to enable coverage reporting
# addopts = --cov=app --cov-report=html --cov-report=term-missing

# Timeout (optional)
# Uncomment to set test timeout
# timeout = 300

# Parallel execution (optional)
# Uncomment to run tests in parallel
# addopts = -n auto
