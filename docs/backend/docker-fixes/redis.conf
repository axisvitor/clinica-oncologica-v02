# ============================================================================
# Redis Configuration for Hormonia Backend
# ============================================================================

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511

# Security
# Password will be loaded from Docker secret at runtime
requirepass ${REDIS_PASSWORD}

# Persistence - AOF (Append Only File) for durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Save to disk (RDB snapshots)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Logging
loglevel notice
logfile ""

# Client Limits
maxclients 10000
timeout 300

# Performance
tcp-keepalive 300
databases 16

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100

# Event notification (for Celery)
notify-keyspace-events Ex

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command SHUTDOWN ""
rename-command DEBUG ""

# ============================================================================
# Production Notes:
# ============================================================================
# 1. Increase maxmemory based on available RAM
# 2. Consider using RDB + AOF for maximum durability
# 3. Monitor slow queries via SLOWLOG GET
# 4. Use Redis Sentinel/Cluster for high availability
# ============================================================================
