version: '3.8'

# ============================================
# Docker Compose - Frontend com Backend Mock
# ============================================
# Para testar frontend localmente com proxy para backend
# Data: 2025-10-05

services:
  # ============================================
  # FRONTEND SERVICE
  # ============================================
  frontend:
    build:
      context: ../frontend-hormonia
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_API_URL: http://localhost:8000/api/v1
        VITE_WS_URL: ws://localhost:8000/ws

    ports:
      - "3000:3000"

    environment:
      # Backend configuration (proxy)
      - BACKEND_HOST=backend
      - BACKEND_PORT=8000
      - PORT=3000

      # API URLs (runtime)
      - VITE_API_URL=http://localhost:8000/api/v1
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_BASE_URL=ws://localhost:8000/ws

      # Application settings
      - VITE_ENVIRONMENT=development
      - VITE_DEBUG_MODE=true
      - VITE_WHATSAPP_INSTANCE_NAME=hormonia-instance

      # Session settings
      - VITE_SESSION_TIMEOUT=3600000
      - VITE_TOKEN_REFRESH_THRESHOLD=300000

      # File upload settings
      - VITE_MAX_FILE_SIZE=10485760
      - VITE_SUPPORTED_FILE_TYPES=image/jpeg,image/png,image/gif,application/pdf

    depends_on:
      - backend

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

    restart: unless-stopped

  # ============================================
  # BACKEND SERVICE (MOCK/REAL)
  # ============================================
  backend:
    # Opção 1: Backend real (descomente e configure)
    # build:
    #   context: ../backend-hormonia
    #   dockerfile: Dockerfile

    # Opção 2: Backend mock para testes (comentado por padrão)
    image: kennethreitz/httpbin

    ports:
      - "8000:80"

    networks:
      - app-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3

    restart: unless-stopped

networks:
  app-network:
    driver: bridge

# ============================================
# VOLUMES (SE NECESSÁRIO)
# ============================================
# volumes:
#   nginx-cache:
#   nginx-logs:

# ============================================
# USO
# ============================================
# Build e start:
#   docker-compose -f docs/docker-compose.frontend.yml up --build
#
# Stop:
#   docker-compose -f docs/docker-compose.frontend.yml down
#
# Logs:
#   docker-compose -f docs/docker-compose.frontend.yml logs -f frontend
#
# Rebuild:
#   docker-compose -f docs/docker-compose.frontend.yml build --no-cache frontend
